name: Secret Scan

# Secretlint scan on PR-changed files (plus post-push diff on main).
# Defense-in-depth over lefthook.yml's `no-secrets` pre-commit hook,
# which is a local grep and only catches `api_key='...'`-shaped strings.
# secretlint's preset-recommend covers AWS, GitHub, Slack, GCP, Linear,
# npm, Stripe, 1Password, Anthropic, database connection strings, JWTs,
# and more.
#
# Inlined (rather than calling nex-crm/.github's reusable) because wuphf
# is a public repo and cannot consume reusable workflows hosted in the
# private nex-crm/.github repo — GitHub Actions silently fails resolution
# regardless of `access_level: organization`. Keep this workflow in sync
# with the shape of the org-wide reusable when that changes.
# Source of truth: https://github.com/nex-crm/.github/blob/main/.github/workflows/scan-secrets.yml

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # Pin to full SHA: third-party action runs on every PR.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1"

      - name: Cache Bun dependencies
        # Pin to full SHA: third-party action, same threat model as checkout.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      # `--ignore-scripts`: defense against malicious postinstall from a
      # dep in the tree. secretlint doesn't need any build step, so this
      # is always safe.
      - name: Install deps
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify secretlint is installed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x node_modules/.bin/secretlint ]; then
            echo "::error::secretlint is not in this repo's devDependencies."
            echo "Add it along with a rule preset, e.g.:"
            echo "  bun add -d secretlint @secretlint/secretlint-rule-preset-recommend"
            echo "And create .secretlintrc.json extending the preset."
            exit 1
          fi

      - name: Determine changed files
        id: changed
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # Exclude patterns: binary files + lockfiles that tend to produce
          # noise. Anchored with `(^|/)...$` for bare filenames so that
          # `docs/bun.lock.md` or `tools/package-lock.json.bak` aren't
          # silently skipped. Extensions are anchored with trailing $.
          # Also exclude the scanner's own test fixtures — they
          # deliberately contain structurally-valid secret shapes (Slack
          # webhook, Postgres URI, etc.) so the scanner under test can
          # match them. No real secrets live here.
          EXCLUDE='((^|/)(bun\.lock|package-lock\.json)$|\.(png|jpe?g|gif|ico|woff2?|ttf|eot|svg|pdf)$|^internal/team/scanner[a-z_]*_test\.go$)'

          # NUL-delimited end-to-end so filenames with spaces / quotes /
          # backslashes don't get split by xargs later. `git diff -z` and
          # `git ls-files -z` both emit NUL-separated paths.
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff -z --name-only --diff-filter=ACMR "origin/${PR_BASE_REF}...HEAD" > /tmp/raw-files.z
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            git diff -z --name-only --diff-filter=ACMR HEAD~1..HEAD > /tmp/raw-files.z
          else
            # First push to main / shallow history edge: scan everything.
            # One-time cost; flagged in coderabbit review.
            git ls-files -z > /tmp/raw-files.z
          fi

          # Apply excludes. Pipeline converts NUL→NL for grep, then NL→NUL
          # for xargs -0. Guard the grep step on non-empty EXCLUDE so an
          # accidentally-empty regex doesn't silently match-all (grep -v ''
          # returns 0 with all lines passing — we'd end up scanning the
          # lockfile noise the exclude exists to suppress).
          if [ -n "$EXCLUDE" ]; then
            tr '\0' '\n' < /tmp/raw-files.z | grep -v -E "$EXCLUDE" | tr '\n' '\0' > /tmp/changed-files.z || true
          else
            cp /tmp/raw-files.z /tmp/changed-files.z
          fi

          if [ ! -s /tmp/changed-files.z ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run secretlint
        if: steps.changed.outputs.skip != 'true'
        shell: bash
        # -0 consumes NUL-delimited paths; -r (--no-run-if-empty) belts-
        # and-braces over the `skip` gate above.
        run: xargs -0 -r -a /tmp/changed-files.z node_modules/.bin/secretlint
