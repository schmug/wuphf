name: Release

on:
  push:
    tags:
      - "v*"
  # workflow_dispatch lets auto-release.yml trigger this workflow via
  # `gh workflow run release.yml --ref <tag>`. A push tag event created with
  # GITHUB_TOKEN does not fire other workflows, but workflow_dispatch does.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build React frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - run: go test ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version
        working-directory: npm
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  smoke-test-npx:
    needs: [release, publish-npm]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for npm registry propagation
        run: sleep 45

      - name: npx wuphf --version
        run: npx --yes "wuphf@$VERSION" --version
