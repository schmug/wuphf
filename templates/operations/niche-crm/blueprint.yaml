id: niche-crm
name: Niche CRM
kind: product_gtm
description: Template for a focused CRM product that can be built and taken to market.
objective: Build a niche CRM, prove the workflow, and run the product and GTM loops together.
employee_blueprints:
  - workflow-automation-builder

starter:
  lead_slug: operator
  general_channel_description: "Command deck for the {{brand_name}} CRM operation."
  kickoff_prompt: "Stand up the {{brand_name}} CRM operation end to end. Use the starter lanes, turn the objective into a repeatable delivery system, create the first product artifacts, and keep outbound and account changes behind human approval."
  agents:
    - slug: operator
      emoji: "⚙️"
      name: Operator
      role: Owns priorities, approvals, and escalation decisions
      permission_mode: plan
      checked: true
      type: lead
      built_in: true
    - slug: planner
      emoji: "🧭"
      name: Planner
      role: Turns product and GTM goals into workstreams and milestones
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Discovery
        - Scoping
        - Product planning
      personality: Clarifies scope quickly and turns ambiguity into an operating plan.
    - slug: builder
      emoji: "🛠️"
      name: Builder
      role: Implements product, schema, and workflow assets
      employee_blueprint: workflow-automation-builder
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Product implementation
        - Schema design
        - Workflow assembly
      personality: Biases toward shipping real artifacts, not commentary.
    - slug: growth
      emoji: "📈"
      name: Growth
      role: Owns outbound, adoption, and feedback loops
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Outbound
        - Positioning
        - Adoption loops
      personality: Treats GTM as an operating system, not a wish.
    - slug: reviewer
      emoji: "🔎"
      name: Reviewer
      role: Owns QA, evidence, and approval gates
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Evidence review
        - Release QA
        - Handoff QA
      personality: Keeps the system durable and visible.
  channels:
    - slug: "{{command_slug}}"
      name: "{{command_slug}}"
      description: "Executive control room for the {{brand_name}} CRM operation."
      members: [planner, builder, reviewer]
    - slug: product
      name: product
      description: "Define the product surface, schema, and delivery plan."
      members: [planner, builder]
    - slug: delivery
      name: delivery
      description: "Build the product, integration assets, and release packets."
      members: [builder, reviewer]
    - slug: revenue
      name: revenue
      description: "Shape outbound, adoption, and commercialization."
      members: [growth, planner]
    - slug: review
      name: review
      description: "Track outcomes, evidence, and the next iteration loop."
      members: [reviewer, growth]
  tasks:
    - channel: product
      owner: planner
      title: "Choose the niche and CRM shape"
      details: "Clarify the target user, core entities, and workflow scope."
    - channel: delivery
      owner: builder
      title: "Map the CRM schema and first workflow"
      details: "Produce the first durable product artifact bundle."
    - channel: revenue
      owner: growth
      title: "Design the outbound and adoption loop"
      details: "Map the first outbound lane to pilot users and feedback."
    - channel: review
      owner: reviewer
      title: "Set the product scorecard and review cadence"
      details: "Define success metrics, review rhythm, and feedback loops for the first iteration."

bootstrap_config:
  channel_name: "{{brand_name}}"
  channel_slug: "{{brand_slug}}"
  niche: "A focused CRM for a specific market that needs a simpler operating loop."
  audience: "Founders, operators, and sales teams who need a narrower CRM"
  positioning: "A niche CRM that can be built, launched, and improved with durable workflows."
  content_pillars:
    - "Product discovery"
    - "Schema design"
    - "Outbound loops"
  content_series:
    - "Discovery notes"
    - "Product sprints"
    - "Pilot reviews"
  monetization_hooks:
    - "pilot"
    - "implementation"
    - "subscription"
    - "adoption"
  publishing_cadence: "Weekly product review"
  lead_magnet:
    name: "Niche CRM Spec"
    cta: "Open the CRM spec"
    path: "/crm-spec"
  monetization_assets:
    - stage: "Day 0"
      name: "Niche CRM Spec"
      slot: "command_room"
      cta: "Open the CRM spec"
    - stage: "Build"
      name: "Schema Blueprint"
      slot: "delivery_lane"
      cta: "Open the schema blueprint"
    - stage: "Launch"
      name: "Outbound Pilot Kit"
      slot: "revenue_lane"
      cta: "Open the pilot kit"
  kpi_tracking:
    - name: "Pilot users booked"
      target: "10+ monthly"
      why: "Proves the product lane can capture demand."
    - name: "Feature-to-feedback cycle time"
      target: "< 2 weeks"
      why: "Shows the operation can move from planning to learning quickly."
    - name: "First paid engagement conversion"
      target: "Within 30 days"
      why: "Confirms the build reaches buyers, not only observers."
    - name: "Repeatable wins"
      target: "2 validated loops"
      why: "Marks the point where the product becomes a reusable business."

automation:
  - id: control-plane
    kicker: Build now
    title: Control plane + workspace defaults
    copy: Load the CRM pack, queue seed, workflow drafts, and approval boundaries from template data instead of rebuilding them in the browser.
    status: build_now
    footer: "Single source of truth: template + runtime state."
  - id: product-engine
    kicker: Build now
    title: Product discovery + schema packets
    copy: Turn product goals into reusable discovery packets with explicit entity models, delivery scope, and approval gates.
    status: build_now
    footer: Product discovery now seeds the first queue automatically.
  - id: release-engine
    kicker: Build now
    title: Release templates + pilot briefs
    copy: Generate release briefs, implementation packets, and pilot notes from the selected product run.
    status: build_now
    footer: Template-derived goals and approvals shape the generator prompt.
  - id: approval-plane
    kicker: Build now
    title: Approval boundaries stay explicit
    copy: Every product run carries its own human approval list so linking accounts, publishing, spend, and legal commitments are blocked until approved.
    status: build_now
    footer: Approval policy is data-driven from the template.
  - id: review-loop
    kicker: Build now
    title: Metrics and review loop
    copy: Track delivery throughput, quality, and adoption latency so the CRM operation improves each iteration.
    status: build_now
    footer: A weekly review loop is seeded by default.

monetization_ladder:
  - kicker: "Step 1"
    title: "pilot"
    copy: "Turn the pilot into a reusable commercial lane in the operating system."
    footer: "Loaded from the product ladder."
  - kicker: "Step 2"
    title: "implementation"
    copy: "Turn the implementation into a reusable commercial lane in the operating system."
    footer: "Loaded from the product ladder."
  - kicker: "Step 3"
    title: "subscription"
    copy: "Turn the subscription into a reusable commercial lane in the operating system."
    footer: "Loaded from the product ladder."
  - kicker: "Step 4"
    title: "adoption services"
    copy: "Turn the adoption services into a reusable commercial lane in the operating system."
    footer: "Loaded from the product ladder."

queue_seed:
  - id: niche-selection
    title: "Choose the niche and CRM shape"
    format: "Operational work item"
    stage_index: 0
    score: 95
    unit_cost: 8
    eta: "Iteration 1"
    monetization: "pilot"
    state: "active"
  - id: schema-design
    title: "Map the CRM schema and first workflow"
    format: "Operational work item"
    stage_index: 1
    score: 90
    unit_cost: 10
    eta: "Iteration 2"
    monetization: "implementation"
    state: "active"
  - id: outbound-loop
    title: "Design the outbound and adoption loop"
    format: "Operational work item"
    stage_index: 2
    score: 86
    unit_cost: 12
    eta: "Iteration 3"
    monetization: "subscription"
    state: "active"
  - id: scorecard-review
    title: "Set the product scorecard and review cadence"
    format: "Operational work item"
    stage_index: 3
    score: 82
    unit_cost: 12
    eta: "Iteration 4"
    monetization: "adoption services"
    state: "active"

stages:
  - id: discover
    name: Discover
    engine: planning
    description: "Clarify the target market, inputs, and product surface."
    exit_criteria: "The product objective and first work items are durable."
  - id: design
    name: Design
    engine: planning
    description: "Turn the directive into an operating plan and artifact map."
    exit_criteria: "Starter tasks, channels, and artifact definitions exist."
  - id: build
    name: Build
    engine: execution
    description: "Produce the first deliverables and workflow assets."
    exit_criteria: "The first execution bundle is reviewable."
  - id: validate
    name: Validate
    engine: review
    description: "Review outputs, smoke-test workflows, and capture evidence."
    exit_criteria: "Evidence is persisted and approvals are explicit."
  - id: launch
    name: Launch
    engine: operations
    description: "Run the loop repeatedly with scorecards and approvals."
    exit_criteria: "The product operation has a repeatable rhythm."

artifacts:
  - id: niche_brief
    name: Niche brief
    description: "Problem statement, niche, constraints, and success criteria."
  - id: schema_spec
    name: Schema spec
    description: "Entities, workflows, integrations, and approval gates."
  - id: execution_packet
    name: Execution packet
    description: "The current run's deliverables, checklist, and handoff context."
  - id: pilot_report
    name: Pilot report
    description: "Durable evidence for one dry-run, mock, or live delivery."

capabilities:
  - id: planning
    name: Planning and decomposition
    kind: planning
    description: "Turn the directive into workstreams, stages, and tasks."
  - id: delivery
    name: Execution and delivery
    kind: execution
    description: "Build the first deliverables and execution bundles."
  - id: integrations
    name: Integrations and handoffs
    kind: integration
    integrations: [github, gmail, slack, google-drive]
    description: "Use connected systems as execution surfaces for the operation."
  - id: approvals
    name: Operations and approvals
    kind: execution
    description: "Run the workflows, enforce approvals, and keep state durable."
  - id: analytics
    name: Metrics and review
    kind: analysis
    description: "Track outcomes, bottlenecks, and loop improvements."

approval_rules:
  - id: external-accounts
    trigger: connect_account
    description: Human approval required before linking or authorizing a real external account.
  - id: public-send
    trigger: public_send_or_publish
    description: Human approval required before any public send, publish, or externally visible update.
  - id: spend
    trigger: spend_money
    description: Human approval required before vendor spend, ad spend, or budget commitments.
  - id: commercial-commitment
    trigger: contract_or_legal_change
    description: Human approval required before legal or commercial commitments.

connections:
  - name: "GitHub implementation lane"
    integration: github
    owner: Engineering
    priority: critical
    purpose: "Use GitHub for product work, issues, and change tracking."
    smoke_test: "Create a dry-run issue and persist evidence."
    blocker: "Needs approved GitHub credentials before any live repository mutation."
  - name: "Gmail pilot lane"
    integration: gmail
    owner: Revenue
    priority: critical
    purpose: "Use Gmail for outreach, onboarding, and customer communication."
    smoke_test: "Send a dry-run pilot acknowledgement and persist evidence."
    blocker: "Needs approved Gmail credentials before any live customer communication."
  - name: "Slack delivery lane"
    integration: slack
    owner: Operations
    priority: critical
    purpose: "Use Slack for team coordination and handoff updates."
    smoke_test: "Run a dry-run update and persist evidence."
    blocker: "Needs approved Slack credentials before any live message."
  - name: "Google Drive evidence lane"
    integration: google-drive
    owner: Knowledge
    priority: important
    purpose: "Use Drive for source assets, product docs, and evidence."
    smoke_test: "Write a mock artifact bundle and confirm persistence."
    blocker: "Needs approved Drive credentials before any live file mutation."

workflows:
  - id: product-intake-dry-run
    name: Product intake dry-run
    trigger: manual
    mode: dry_run
    integrations: [github, gmail]
    checklist:
      - Confirm product fields
      - Persist evidence
      - Capture approval gate
    description: Validate the product intake and handoff path without live side effects.
    definition:
      provider: one
      key: product-intake-dry-run
    smoke_test:
      name: Product intake dry-run
      mode: dry_run
      proof: Workflow evidence persisted without touching external systems.
      inputs:
        operation_name: Niche CRM
  - id: schema-review
    name: Schema review
    trigger: manual
    mode: dry_run
    integrations: [google-drive, github]
    checklist:
      - Confirm source inputs
      - Produce schema spec
      - Persist audit evidence
    description: Validate the schema-review path and produce the first product-ready map.
    definition:
      provider: one
      key: schema-review
    smoke_test:
      name: Schema review
      mode: dry_run
      proof: Schema evidence persisted successfully.
      inputs:
        operation_name: Niche CRM
  - id: outbound-pilot
    name: Outbound pilot
    trigger: manual
    mode: mock
    integrations: [gmail, slack]
    checklist:
      - Confirm outreach scope
      - Run the mock pilot
      - Persist pilot evidence
    description: Validate the outbound-pilot path for the product run.
    definition:
      provider: one
      key: outbound-pilot
    smoke_test:
      name: Outbound pilot
      mode: mock
      proof: Pilot evidence persisted successfully.
      inputs:
        operation_name: Niche CRM
  - id: release-handoff
    name: Release handoff
    trigger: manual
    mode: mock
    integrations: [slack, google-drive]
    checklist:
      - Confirm handoff checklist
      - Confirm review gate
      - Persist release evidence
    description: Validate the final release handoff and evidence trail.
    definition:
      provider: one
      key: release-handoff
    smoke_test:
      name: Release handoff
      mode: mock
      proof: Release evidence persisted successfully.
      inputs:
        operation_name: Niche CRM

wiki_schema:
  dirs:
    - team/customers/
    - team/playbooks/
    - team/product/
    - team/decisions/
    - team/inbox/
  bootstrap:
    - path: team/customers/onboarding.md
      title: "Customer onboarding playbook"
      skeleton: |
        # Customer onboarding

        _(The first 14 days after a customer installs the CRM. Document the calls we make, the data we load for them, and the "aha" moments we try to engineer. Per-customer notes branch off this page.)_
    - path: team/playbooks/renewal.md
      title: "Renewal and retention playbook"
      skeleton: |
        # Renewal and retention

        _(How we catch churn risk 60 days out, what we say when we see it, and what actually saves a renewal. Document the wins and the losses.)_
    - path: team/product/roadmap-rationale.md
      title: "Roadmap rationale"
      skeleton: |
        # Roadmap rationale

        _(Not the public roadmap — the reasoning behind it. What we are choosing NOT to build and why. Revisit quarterly.)_
    - path: team/decisions/product-log.md
      title: "Product decisions log"
      skeleton: |
        # Product decisions log

        _(One dated entry per non-trivial product decision: what we decided, what options we rejected, what would make us revisit. Keep entries short; link to longer docs if needed.)_
    - path: team/inbox/raw-feedback.md
      title: "Raw customer feedback"
      skeleton: |
        # Raw customer feedback

        _(Unprocessed quotes from calls, support threads, and surveys. Periodically the team reviews this page and promotes patterns up to product/ or playbooks/.)_
