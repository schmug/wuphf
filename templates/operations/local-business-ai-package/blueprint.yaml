id: local-business-ai-package
name: Local Business AI Package
kind: local_service
description: Template for an AI package that helps local businesses automate intake, booking, follow-up, and reporting.
objective: Help local businesses automate intake, booking, follow-up, and reporting with durable evidence and clear approval gates.
employee_blueprints:
  - workflow-automation-builder

starter:
  lead_slug: operator
  general_channel_description: "Command deck for the {{brand_name}} local operations package."
  kickoff_prompt: "Stand up the {{brand_name}} local business operation end to end. Use the starter lanes, turn the objective into a repeatable service system, create the first client-ready artifacts, and keep customer-facing changes behind human approval."
  agents:
    - slug: operator
      emoji: "⚙️"
      name: Operator
      role: Owns priorities, approvals, and escalation decisions
      permission_mode: plan
      checked: true
      type: lead
      built_in: true
    - slug: planner
      emoji: "🧭"
      name: Planner
      role: Turns client goals into workstreams, milestones, and task plans
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Discovery
        - Scoping
        - Service planning
      personality: Clarifies scope quickly and turns ambiguity into an operating plan.
    - slug: builder
      emoji: "🛠️"
      name: Builder
      role: Implements the intake, booking, and reporting assets
      employee_blueprint: workflow-automation-builder
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Booking workflows
        - Intake setup
        - Reporting bundles
      personality: Biases toward shipping real artifacts, not commentary.
    - slug: client-success
      emoji: "🤝"
      name: Client Success
      role: Owns follow-up, response loops, and account experience
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Customer communication
        - Follow-up loops
        - Service handoff
      personality: Treats responsiveness and clarity as part of the product.
    - slug: reviewer
      emoji: "🔎"
      name: Reviewer
      role: Owns QA, evidence, and approval gates
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Evidence review
        - Service QA
        - Handoff QA
      personality: Keeps the system durable and visible.
  channels:
    - slug: "{{command_slug}}"
      name: "{{command_slug}}"
      description: "Executive control room for the {{brand_name}} local operations package."
      members: [planner, builder, reviewer]
    - slug: intake
      name: intake
      description: "Collect client context, constraints, and service opportunities."
      members: [planner, client-success]
    - slug: delivery
      name: delivery
      description: "Build the booking, intake, and reporting assets."
      members: [builder, client-success]
    - slug: growth
      name: growth
      description: "Shape outbound, follow-up, and adoption loops."
      members: [client-success, planner]
    - slug: review
      name: review
      description: "Track outcomes, evidence, and the next iteration loop."
      members: [reviewer, planner]
  tasks:
    - channel: intake
      owner: planner
      title: "Map the local business workflow"
      details: "Clarify the lead sources, booking path, and service scope."
    - channel: delivery
      owner: builder
      title: "Create the intake and booking system"
      details: "Produce the first durable service artifact bundle."
    - channel: growth
      owner: client-success
      title: "Design the follow-up and response loop"
      details: "Map the first outbound lane to leads and customer follow-up."
    - channel: review
      owner: reviewer
      title: "Set the service scorecard and review cadence"
      details: "Define success metrics, review rhythm, and feedback loops for the first iteration."

bootstrap_config:
  channel_name: "{{brand_name}}"
  channel_slug: "{{brand_slug}}"
  niche: "AI automation for local businesses that need a cleaner service workflow."
  audience: "Local service owners, office managers, and operators"
  positioning: "A local business AI package that can be deployed, launched, and improved with durable workflows."
  content_pillars:
    - "Intake automation"
    - "Booking workflows"
    - "Reporting and follow-up"
  content_series:
    - "Service setup"
    - "Workflow activations"
    - "Weekly reporting"
  monetization_hooks:
    - "setup"
    - "management"
    - "optimization"
    - "retainer"
  publishing_cadence: "Weekly service review"
  lead_magnet:
    name: "Local Ops Audit"
    cta: "Open the local ops audit"
    path: "/local-ops-audit"
  monetization_assets:
    - stage: "Day 0"
      name: "Local Ops Audit"
      slot: "command_room"
      cta: "Open the local ops audit"
    - stage: "Setup"
      name: "Booking Workflow Map"
      slot: "delivery_lane"
      cta: "Open the booking map"
    - stage: "Review"
      name: "Reporting Bundle"
      slot: "review_lane"
      cta: "Open the reporting bundle"
  kpi_tracking:
    - name: "Intake-to-booking conversion"
      target: "15%+ monthly"
      why: "Proves the package can capture demand."
    - name: "Service response cycle time"
      target: "< 1 business day"
      why: "Shows the operation can respond quickly."
    - name: "First paid engagement conversion"
      target: "Within 30 days"
      why: "Confirms the service reaches buyers, not only observers."
    - name: "Repeatable wins"
      target: "2 validated loops"
      why: "Marks the point where the service becomes reusable."

automation:
  - id: control-plane
    kicker: Build now
    title: Control plane + workspace defaults
    copy: Load the local service pack, queue seed, workflow drafts, and approval boundaries from template data instead of rebuilding them in the browser.
    status: build_now
    footer: "Single source of truth: template + runtime state."
  - id: intake-engine
    kicker: Build now
    title: Client intake + booking packets
    copy: Turn service goals into reusable intake packets with explicit proof assets, delivery scope, and approval gates.
    status: build_now
    footer: Intake now seeds the first queue automatically.
  - id: service-engine
    kicker: Build now
    title: Service templates + reporting briefs
    copy: Generate service briefs, implementation packets, and reporting notes from the selected operation run.
    status: build_now
    footer: Template-derived goals and approvals shape the generator prompt.
  - id: approval-plane
    kicker: Build now
    title: Approval boundaries stay explicit
    copy: Every service run carries its own human approval list so linking accounts, publishing, spend, and legal commitments are blocked until approved.
    status: build_now
    footer: Approval policy is data-driven from the template.
  - id: review-loop
    kicker: Build now
    title: Metrics and review loop
    copy: Track delivery throughput, quality, and response latency so the local operations package improves each iteration.
    status: build_now
    footer: A weekly review loop is seeded by default.

monetization_ladder:
  - kicker: "Step 1"
    title: "setup"
    copy: "Turn the setup into a reusable commercial lane in the operating system."
    footer: "Loaded from the local-service ladder."
  - kicker: "Step 2"
    title: "management"
    copy: "Turn the management package into a reusable commercial lane in the operating system."
    footer: "Loaded from the local-service ladder."
  - kicker: "Step 3"
    title: "optimization"
    copy: "Turn the optimization package into a reusable commercial lane in the operating system."
    footer: "Loaded from the local-service ladder."
  - kicker: "Step 4"
    title: "retainer"
    copy: "Turn the retainer into a reusable commercial lane in the operating system."
    footer: "Loaded from the local-service ladder."

queue_seed:
  - id: service-map
    title: "Map the local business workflow"
    format: "Operational work item"
    stage_index: 0
    score: 95
    unit_cost: 8
    eta: "Iteration 1"
    monetization: "setup"
    state: "active"
  - id: booking-system
    title: "Create the intake and booking system"
    format: "Operational work item"
    stage_index: 1
    score: 90
    unit_cost: 10
    eta: "Iteration 2"
    monetization: "management"
    state: "active"
  - id: follow-up-loop
    title: "Design the follow-up and response loop"
    format: "Operational work item"
    stage_index: 2
    score: 86
    unit_cost: 12
    eta: "Iteration 3"
    monetization: "optimization"
    state: "active"
  - id: scorecard-review
    title: "Set the service scorecard and review cadence"
    format: "Operational work item"
    stage_index: 3
    score: 82
    unit_cost: 12
    eta: "Iteration 4"
    monetization: "retainer"
    state: "active"

stages:
  - id: discover
    name: Discover
    engine: planning
    description: "Clarify the local market, inputs, and service surface."
    exit_criteria: "The service objective and first work items are durable."
  - id: setup
    name: Setup
    engine: planning
    description: "Turn the directive into an operating plan and artifact map."
    exit_criteria: "Starter tasks, channels, and artifact definitions exist."
  - id: activate
    name: Activate
    engine: execution
    description: "Produce the first deliverables and workflow assets."
    exit_criteria: "The first execution bundle is reviewable."
  - id: validate
    name: Validate
    engine: review
    description: "Review outputs, smoke-test workflows, and capture evidence."
    exit_criteria: "Evidence is persisted and approvals are explicit."
  - id: operate
    name: Operate
    engine: operations
    description: "Run the loop repeatedly with scorecards and approvals."
    exit_criteria: "The service operation has a repeatable rhythm."

artifacts:
  - id: service_brief
    name: Service brief
    description: "Problem statement, local market, constraints, and success criteria."
  - id: workflow_map
    name: Workflow map
    description: "Roles, handoffs, integrations, and approval gates."
  - id: execution_packet
    name: Execution packet
    description: "The current run's deliverables, checklist, and handoff context."
  - id: reporting_bundle
    name: Reporting bundle
    description: "Durable evidence for one dry-run, mock, or live delivery."

capabilities:
  - id: planning
    name: Planning and decomposition
    kind: planning
    description: "Turn the directive into workstreams, stages, and tasks."
  - id: delivery
    name: Execution and delivery
    kind: execution
    description: "Build the first deliverables and execution bundles."
  - id: integrations
    name: Integrations and handoffs
    kind: integration
    integrations: [gmail, calendar, slack, google-drive]
    description: "Use connected systems as execution surfaces for the operation."
  - id: approvals
    name: Operations and approvals
    kind: execution
    description: "Run the workflows, enforce approvals, and keep state durable."
  - id: analytics
    name: Metrics and review
    kind: analysis
    description: "Track outcomes, bottlenecks, and loop improvements."

approval_rules:
  - id: external-accounts
    trigger: connect_account
    description: Human approval required before linking or authorizing a real external account.
  - id: customer-send
    trigger: public_send_or_publish
    description: Human approval required before any customer-facing send or externally visible update.
  - id: spend
    trigger: spend_money
    description: Human approval required before vendor spend, ad spend, or budget commitments.
  - id: commercial-commitment
    trigger: contract_or_legal_change
    description: Human approval required before legal or commercial commitments.

connections:
  - name: "Gmail intake lane"
    integration: gmail
    owner: Operations
    priority: critical
    purpose: "Use Gmail for intake, follow-up, and customer communication."
    smoke_test: "Send a dry-run intake acknowledgement and persist evidence."
    blocker: "Needs approved Gmail credentials before any live customer communication."
  - name: "Calendar booking lane"
    integration: calendar
    owner: Operations
    priority: critical
    purpose: "Use Calendar for bookings, appointments, and review calls."
    smoke_test: "Create a dry-run booking request and persist evidence."
    blocker: "Needs approved calendar access before any live scheduling."
  - name: "Slack delivery lane"
    integration: slack
    owner: Operations
    priority: critical
    purpose: "Use Slack for team coordination and handoff updates."
    smoke_test: "Run a dry-run update and persist evidence."
    blocker: "Needs approved Slack credentials before any live message."
  - name: "Google Drive evidence lane"
    integration: google-drive
    owner: Knowledge
    priority: important
    purpose: "Use Drive for source assets, deliverables, and evidence."
    smoke_test: "Write a mock artifact bundle and confirm persistence."
    blocker: "Needs approved Drive credentials before any live file mutation."

workflows:
  - id: intake-dry-run
    name: Intake dry-run
    trigger: manual
    mode: dry_run
    integrations: [gmail]
    checklist:
      - Confirm intake fields
      - Persist evidence
      - Capture approval gate
    description: Validate the service intake and follow-up path without live side effects.
    definition:
      provider: one
      key: intake-dry-run
    smoke_test:
      name: Intake dry-run
      mode: dry_run
      proof: Workflow evidence persisted without touching external systems.
      inputs:
        operation_name: Local Business AI Package
  - id: booking-workflow
    name: Booking workflow
    trigger: manual
    mode: dry_run
    integrations: [calendar, gmail]
    checklist:
      - Confirm booking flow
      - Produce service map
      - Persist audit evidence
    description: Validate the booking workflow and produce the first service-ready map.
    definition:
      provider: one
      key: booking-workflow
    smoke_test:
      name: Booking workflow
      mode: dry_run
      proof: Booking evidence persisted successfully.
      inputs:
        operation_name: Local Business AI Package
  - id: follow-up-loop
    name: Follow-up loop
    trigger: manual
    mode: mock
    integrations: [gmail, slack]
    checklist:
      - Confirm follow-up scope
      - Run the mock loop
      - Persist follow-up evidence
    description: Validate the follow-up loop for the service run.
    definition:
      provider: one
      key: follow-up-loop
    smoke_test:
      name: Follow-up loop
      mode: mock
      proof: Follow-up evidence persisted successfully.
      inputs:
        operation_name: Local Business AI Package
  - id: reporting-handoff
    name: Reporting handoff
    trigger: manual
    mode: mock
    integrations: [slack, google-drive]
    checklist:
      - Confirm handoff checklist
      - Confirm review gate
      - Persist reporting evidence
    description: Validate the final reporting handoff and evidence trail.
    definition:
      provider: one
      key: reporting-handoff
    smoke_test:
      name: Reporting handoff
      mode: mock
      proof: Reporting evidence persisted successfully.
      inputs:
        operation_name: Local Business AI Package

wiki_schema:
  dirs:
    - team/clients/
    - team/deployment/
    - team/playbooks/
    - team/decisions/
  bootstrap:
    - path: team/clients/intake.md
      title: "Local business intake"
      skeleton: |
        # Local business intake

        _(One page per client gets forked off this template as the team signs a deployment. Capture the real-world context that never makes it into the CRM: parking, who has the keys, when the owner is reachable, which staff will actually touch the AI.)_

        ## Essentials
        - Business type and footprint
        - Primary owner / decision maker
        - Who uses it day-to-day
        - What "working" looks like for them in plain English
    - path: team/deployment/kiosk-setup.md
      title: "Kiosk and on-site deployment"
      skeleton: |
        # Kiosk and on-site deployment

        _(Hardware choices, network quirks, authentication patterns for storefront setups. Add a new subsection every time a deployment teaches us something non-obvious.)_
    - path: team/deployment/remote-setup.md
      title: "Remote and BYOD deployment"
      skeleton: |
        # Remote and BYOD deployment

        _(For clients whose staff use their own phones or laptops. Access control patterns, offline fallback, data boundaries.)_
    - path: team/playbooks/first-week.md
      title: "First week playbook"
      skeleton: |
        # First week playbook

        _(The first 7 days after go-live are where most local businesses decide if the AI package is worth keeping. Document the call cadence, the "it's not doing X" triage tree, and the wins worth amplifying.)_
    - path: team/decisions/common-pitfalls.md
      title: "Common pitfalls log"
      skeleton: |
        # Common pitfalls log

        _(Every deployment has failure modes. Record them here, dated, with the fix. Future onboardings search this page first.)_
