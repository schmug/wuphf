id: youtube-factory
name: YouTube Factory
kind: media_business
description: Template for a repeatable video-led business with human-gated external side effects.
objective: Build and run a repeatable video operation with durable planning, reusable workflows, integration-backed execution, and explicit human approvals at external side effects.
employee_blueprints:
  - workflow-automation-builder

starter:
  lead_slug: ceo
  general_channel_description: "Command deck for the {{brand_name}} launch."
  kickoff_prompt: "Build the {{brand_name}} business end to end. Use the specialist lanes already created and come back with the launch plan, the first publishable backlog, script briefs, the production SOP, packaging rules, integration smoke-test plan, and the monetization ladder."
  agents:
    - slug: ceo
      emoji: "👔"
      name: CEO
      role: Owns strategy, delegation, and commercial priorities
      permission_mode: plan
      checked: true
      type: lead
      built_in: true
    - slug: research-lead
      emoji: "🔎"
      name: Research Lead
      role: Demand discovery, proof gathering, and topic scoring
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Search intent
        - Topic scoring
        - Competitive teardown
        - Audience pain mining
      personality: Fast, skeptical, and focused on proof before production.
    - slug: scriptwriter
      emoji: "✍️"
      name: Scriptwriter
      role: Hooks, outlines, scripts, and repurposing briefs
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Hooks
        - Narrative structure
        - Retention pacing
        - CTA placement
      personality: Writes for clarity, pace, and commercial relevance.
    - slug: editor
      emoji: "🎬"
      name: Editor
      role: Production workflow, QA, handoffs, and publish packages
      employee_blueprint: workflow-automation-builder
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Editing workflow
        - Voiceover timing
        - Screen recordings
        - Package QA
      personality: Operational, deadline-driven, and disciplined about source quality.
    - slug: packaging-lead
      emoji: "🎯"
      name: Packaging Lead
      role: Titles, thumbnails, and click-through systems
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Packaging systems
        - Thumbnail contrast
        - Title testing
        - Visual coherence
      personality: Designs for attention without trashing the brand.
    - slug: growth-ops
      emoji: "📈"
      name: Growth Ops
      role: Publishing cadence, optimization loops, and analytics hygiene
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Distribution
        - Metadata testing
        - Cadence planning
        - Scorecards
      personality: Treats distribution as an operating system, not a wish.
    - slug: monetization
      emoji: "💸"
      name: Monetization Lead
      role: Offers, lead magnets, sponsors, and revenue ops
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Affiliate offers
        - Digital products
        - Sponsor packaging
        - Revenue ops
      personality: Commercially sharp and impatient with vanity metrics.
  channels:
    - slug: "{{command_slug}}"
      name: "{{command_slug}}"
      description: "CEO control room for the {{brand_name}} business."
      members: [research-lead, growth-ops, monetization]
    - slug: research
      name: research
      description: Demand research, audience pain points, proof assets, and topic scoring.
      members: [research-lead, scriptwriter]
    - slug: scripts
      name: scripts
      description: Hooks, outlines, scripts, and short-form repurposing notes.
      members: [scriptwriter]
    - slug: production
      name: production
      description: Editing, media workflow, narration, QA, and publish packages.
      members: [editor]
    - slug: packaging
      name: packaging
      description: Titles, thumbnails, and packaging experiments.
      members: [packaging-lead, growth-ops]
    - slug: growth
      name: growth
      description: Cadence, scorecards, distribution loops, and backlog updates.
      members: [growth-ops]
    - slug: revenue
      name: revenue
      description: Lead magnets, offers, sponsors, and monetization experiments.
      members: [monetization]
  tasks:
    - channel: research
      owner: research-lead
      title: Build the first operating backlog
      details: "Score the first topics for {{brand_name}} by demand, proof, and monetization fit."
    - channel: scripts
      owner: scriptwriter
      title: Draft the first script briefs
      details: Turn the highest-confidence backlog items into outlines, hooks, and repurposing notes.
    - channel: production
      owner: editor
      title: Standardize the production workflow
      details: Define the asset, QA, and handoff SOP from brief to publish package.
    - channel: packaging
      owner: packaging-lead
      title: Create the packaging system
      details: Ship reusable title and thumbnail rules that support iteration without losing coherence.
    - channel: growth
      owner: growth-ops
      title: Set the publishing and review loop
      details: Define the weekly release rhythm, scorecard review, and backlog feedback cycle.
    - channel: revenue
      owner: monetization
      title: Launch the first monetization paths
      details: Map the first content lanes to lead magnet, product, affiliate, and sponsor opportunities.

bootstrap_config:
  channel_name: "{{brand_name}}"
  channel_slug: "{{brand_slug}}"
  niche: "The YouTube channel for people running AI agents like a real team, not a ticket queue."
  audience: "AI operators, GTM engineers, technical founders, Claude Pro and Max users running 3+ agents, teams looking for better multi-agent visibility"
  positioning: "Operator-grade multi-agent demos, migration breakdowns, and runbooks for teams that need visibility and control."
  content_pillars:
    - "Show me how to see and interrupt agents before bad work compounds."
    - "Give me the shortest path away from blind orchestration and ticket-queue workflows."
    - "Help me run 3+ agents without idle burn, workspace chaos, or fake completion."
  content_series:
    - "Live Steering Demos"
    - "Migration and Comparison"
    - "Agent Ops Fixes"
    - "AI Team Builds"
  monetization_hooks:
    - "free_benchmark"
    - "product_demo_or_pilot"
    - "affiliate_stack_pages"
    - "digital_products"
    - "agent_ops_teardown"
    - "implementation_sprint"
    - "sponsor"
    - "ads"
  publishing_cadence: "2 release days/week (Monday, Thursday)"
  lead_magnet:
    name: "CEP Benchmark + Migration Checklist"
    cta: "Get the Benchmark Kit"
    path: "/benchmark-migration-kit"
  monetization_assets:
    - stage: "Day 0"
      name: "CEP Benchmark + Migration Checklist"
      slot: "pinned_comment"
      cta: "Get the Benchmark Kit"
    - stage: "Support"
      name: "AI Office Starter Pack"
      slot: "description_links"
      cta: "Open AI Office Starter Pack"
    - stage: "Support"
      name: "Migration Kit"
      slot: "description_links"
      cta: "Open Migration Kit"
    - stage: "Support"
      name: "Agent Manager Scorecard"
      slot: "description_links"
      cta: "Open Agent Manager Scorecard"
    - stage: "Support"
      name: "Multi-Agent Operating Playbook"
      slot: "description_links"
      cta: "Open Multi-Agent Operating Playbook"
  kpi_tracking:
    - name: "Primary CTA conversions"
      target: "25+ monthly"
      why: "Proves WUPHF is capturing owned demand instead of only views."
    - name: "Workflow click-through"
      target: "3%+"
      why: "Shows the monetization lane matches the workflow problem."
    - name: "First paid offer conversion"
      target: "Within 30 days"
      why: "Confirms the content engine reaches buyers, not only viewers."
    - name: "Repeatable winners"
      target: "2 episodes above baseline CTR + retention"
      why: "Marks the point where sponsor and scale experiments become sensible."

automation:
  - id: control-plane
    kicker: Build now
    title: Control plane + workspace defaults
    copy: Load the business pack, queue seed, workflow drafts, and approval boundaries from repo data instead of rebuilding them in the browser.
    status: build_now
    footer: "Single source of truth: channel pack + backlog + monetization registry."
  - id: research-engine
    kicker: Build now
    title: Research intake + scoring packets
    copy: Turn backlog episodes into reusable topic packets with explicit proof assets, CTA routing, and scoring inputs.
    status: build_now
    footer: Backlog priorities now seed the first queue automatically.
  - id: script-engine
    kicker: Build now
    title: Script templates + repurposing briefs
    copy: Generate topic packets, script briefs, and publish packages from the selected run without hardcoding the niche in the UI.
    status: build_now
    footer: Pack-derived thesis and CTA rules shape the generator prompt.
  - id: media-adapters
    kicker: "{{connection_mode}}"
    title: Media, publish, and analytics adapters
    copy: Treat external systems as runtime capabilities discovered from configured providers and connected platforms, not fixed stubs in the page.
    status: "{{connection_status}}"
    footer: "{{connection_footer}}"
  - id: approval-plane
    kicker: Build now
    title: Approval boundaries stay explicit
    copy: Every pack carries its own human approval list so linking accounts, publishing, spend, and legal commitments are blocked until approved.
    status: build_now
    footer: "{{approval_boundaries}}"
  - id: revenue-ops
    kicker: Build now
    title: Revenue ops from the first upload
    copy: Lead magnet, product, audit, and sponsor paths are loaded from the monetization registry so every run knows its commercial lane from day zero.
    status: build_now
    footer: Offer routing is data-driven from the registry, not handwritten per run.

