stages:
  - id: research
    name: Research
    engine: Signal intake + scoring
    description: Collect source packets, proof assets, and demand signals before anything is scripted.
    exit_criteria: Keep only high-confidence packets with explicit evidence and clear audience pain.
  - id: script
    name: Script
    engine: Narrative template + facts
    description: Turn the approved packet into a reusable brief with hook, beats, CTA, and citations.
    exit_criteria: No low-confidence claims and no missing CTA or proof chain.
  - id: voiceover
    name: Voiceover
    engine: Narration system
    description: Generate or prepare narration variants by format and audience.
    exit_criteria: Pacing, pronunciation, and loudness pass before edit assets move forward.
  - id: edit
    name: Edit
    engine: Template compositor
    description: Render the visual package, motion system, captions, and cut structure.
    exit_criteria: Opening retention, caption integrity, and QA handoff complete.
  - id: thumbnail
    name: Packaging
    engine: Packaging system
    description: Produce the title and visual package that carries the promise clearly.
    exit_criteria: Clear promise, contrast, and curiosity angle validated.
  - id: publish
    name: Publish
    engine: Queue + attribution
    description: Assemble final metadata, links, tags, and approval-gated publish actions.
    exit_criteria: Final QA, approvals, and commercial metadata are complete.

artifacts:
  - id: topic_packet
    name: Topic packet
    description: Research and proof packet for one potential run.
  - id: script_brief
    name: Script brief
    description: Hook, beats, CTA, and repurposing structure for one run.
  - id: publish_package
    name: Publish package
    description: Metadata, links, tags, and destination-ready delivery bundle.
  - id: workflow_run
    name: Workflow run
    description: Durable evidence for one dry-run, mock, or live execution.

capabilities:
  - id: content-research
    name: Content research
    kind: planning
    description: Generate and score source packets for candidate runs.
  - id: content-production
    name: Content production
    kind: execution
    description: Produce briefs, assets, and publish bundles from approved packets.
  - id: distribution
    name: Distribution and analytics
    kind: execution
    integrations: [youtube-data-api, youtube-analytics]
    description: Manage publishing and performance feedback loops.
  - id: revenue-ops
    name: Revenue operations
    kind: execution
    integrations: [gmail, slack]
    description: Route CTAs, sponsor motions, and internal operational alerts.

approval_rules:
  - id: external-accounts
    trigger: connect_account
    description: Human approval required before linking real external accounts.
  - id: public-publish
    trigger: public_publish
    description: Human approval required before any public publish or externally visible send.
  - id: spend
    trigger: spend_money
    description: Human approval required before any vendor spend or budget commitment.
  - id: commercial-commitment
    trigger: contract_or_sponsor
    description: Human approval required before legal or commercial commitments.

connections:
  - name: YouTube upload lane
    integration: youtube-data-api
    owner: Publishing
    priority: critical
    purpose: Upload videos, update metadata, and schedule publish windows.
    smoke_test: Run a dry-run metadata + scheduling workflow against a mock video payload.
    blocker: Needs approved channel credentials before any live upload or publish.
  - name: Asset storage lane
    integration: google-drive
    owner: Storage
    priority: critical
    purpose: Store scripts, thumbnails, voice renders, and publish packages in a shared folder tree.
    smoke_test: Dry-run the folder and handoff manifest creation without touching a live destination.
    blocker: Needs a real Drive destination and approved folder permissions.
  - name: Performance ingest lane
    integration: youtube-analytics
    owner: Analytics
    priority: important
    purpose: Pull CTR, retention, and revenue metrics back into the editorial scorecard.
    smoke_test: Replay an analytics fixture and confirm the scorecard accepts the metrics.
    blocker: Needs approved analytics scopes and reporting windows.
  - name: Outbound ops lane
    integration: gmail
    owner: Outreach/Ops
    priority: critical
    purpose: Send sponsor outreach, approvals, and delivery emails from a real team inbox.
    smoke_test: Dry-run a sponsor intro email and check subject/body merge fields.
    blocker: Needs inbox ownership and outbound policy approval.
  - name: Internal alerting lane
    integration: slack
    owner: Ops
    priority: important
    purpose: Push publish failures, missed deadlines, and workflow completions into the operating channel.
    smoke_test: Mock a publish-complete alert with channel, title, and asset links.
    blocker: Needs the target workspace/channel and alert routing approval.

workflows:
  - id: yt-publish-package-dry-run
    name: YouTube Publish Package Dry-Run
    trigger: Use when the team wants to validate an upload package before real channel credentials exist.
    mode: dry_run
    integrations: [youtube-data-api, google-drive]
    description: Validate upload metadata and asset manifest without touching a live channel.
    definition:
      version: 1
      provider: one
      key: yt-publish-package-dry-run
      steps:
        - id: validate-inputs
          kind: transform
          note: Normalize title, description, tags, and asset manifest paths.
        - id: youtube-upload-preview
          kind: action
          platform: youtube-data-api
          action: videos.insert
          dry_run: true
        - id: drive-manifest-preview
          kind: action
          platform: google-drive
          action: files.create
          dry_run: true
    smoke_test:
      name: Publish package dry-run
      mode: dry_run
      proof: Produces a request envelope for upload metadata and a storage manifest without side effects.
      inputs:
        title: AI CRM in 15 Minutes
        visibility: private
        asset_manifest: gs://stub/channel-business/episode-001.json
  - id: drive-asset-handoff-dry-run
    name: Google Drive Asset Handoff Dry-Run
    trigger: Use when the team wants a reviewable Drive package structure before any real files or permissions are touched.
    mode: dry_run
    integrations: [google-drive]
    description: Stage asset package structure and reviewer handoff notes.
    schedule: on publish package ready
    definition:
      version: 1
      provider: one
      key: drive-asset-handoff-dry-run
      steps:
        - id: normalize-package
          kind: transform
          note: Build the package slug, folder names, placeholder asset list, and reviewer metadata.
        - id: drive-folder-preview
          kind: action
          platform: google-drive
          action: files.create
          dry_run: true
        - id: drive-placeholder-preview
          kind: action
          platform: google-drive
          action: files.create
          dry_run: true
        - id: handoff-summary
          kind: transform
          note: Emit the package checklist, naming audit, and reviewer-ready handoff summary.
    smoke_test:
      name: Drive handoff dry-run
      mode: dry_run
      proof: Builds the folder, placeholder files, and QA notes for a reviewable asset package without touching a live Drive destination.
      inputs:
        package_slug: episode-001-launch-packet
        root_folder_id: stub-drive-root
        qa_owner: ops@example.com
        asset_count: 5
  - id: sponsor-outreach-dry-run
    name: Sponsor Outreach Dry-Run
    trigger: Use when GTM or Ops wants a reviewable sponsor email before a real inbox is authorized.
    mode: dry_run
    integrations: [gmail]
    description: Build a reviewable sponsor email payload before a real inbox is authorized.
    definition:
      version: 1
      provider: one
      key: sponsor-outreach-dry-run
      steps:
        - id: compose-email
          kind: transform
          note: Assemble subject line, offer framing, and CTA from the package brief.
        - id: gmail-preview
          kind: action
          platform: gmail
          action: users.messages.send
          dry_run: true
    smoke_test:
      name: Sponsor outreach dry-run
      mode: dry_run
      proof: Builds the outbound email payload with recipient, subject, and CTA merge fields.
      inputs:
        brand: Example Sponsor
        contact_email: partner@example.com
        video_angle: AI ops workflow teardown
  - id: publish-alert-slack-mock
    name: Publish Alert Slack Mock
    trigger: Use when the team wants an internal delivery alert format before Slack credentials are approved.
    mode: mock
    integrations: [slack, google-drive]
    description: Mock the internal publish-complete alert and linked asset payload.
    schedule: on publish package ready
    definition:
      version: 1
      provider: one
      key: publish-alert-slack-mock
      steps:
        - id: render-alert
          kind: transform
          note: Build the alert text, asset links, and QA checklist summary.
        - id: slack-preview
          kind: action
          platform: slack
          action: chat.postMessage
          mock: true
    smoke_test:
      name: Publish alert mock
      mode: mock
      proof: Assembles the internal alert body and asset links for a completed publish package.
      inputs:
        channel: "#yt-ops"
        video_title: 3 Workflows I Actually Use
        package_url: https://drive.google.com/stub/package-001
  - id: yt-analytics-fixture-replay
    name: YouTube Analytics Fixture Replay
    trigger: Use when the team needs to test backlog scoring and reporting without live analytics access.
    mode: dry_run
    integrations: [youtube-analytics]
    description: Replay analytics fixtures through the scorecard without live reporting access.
    schedule: daily after publishing
    checklist:
      - Fixture window and requested dimensions match the dry-run input packet.
      - Report rows include views, watch-time, retention, CTR, and revenue fields required by the scorecard.
      - "Derived metric math is internally consistent: average view duration, average view percentage, CTR, and RPM."
      - Missing or zero-value metrics are surfaced as explicit warnings instead of silently coerced.
      - Export payload keeps the expected scorecard keys and includes source run metadata for replay auditing.
    definition:
      version: 1
      provider: one
      key: yt-analytics-fixture-replay
      steps:
        - id: load-fixture
          kind: transform
          note: Load fixture rows and normalize report request inputs for the replay window.
        - id: reports-query-preview
          kind: action
          platform: youtube-analytics
          action: reports.query
          dry_run: true
        - id: validate-metrics
          kind: transform
          note: Recompute retention, CTR, and RPM expectations against the fixture payload and flag mismatches.
        - id: stage-scorecard-export
          kind: transform
          note: Project the validated metrics into the editorial scorecard/export placeholder shape.
    smoke_test:
      name: Analytics ingest fixture replay
      mode: mock
      proof: Replays fixture report rows, validates core metric math, and stages a scorecard export payload without live analytics access.
      inputs:
        video_id: stub-video-001
        window: last_7_days
        dimensions: day
        metrics: views,estimatedMinutesWatched,averageViewDuration,averageViewPercentage,impressions,impressionClickThroughRate,estimatedRevenue
        export_target: scorecard_stub

wiki_schema:
  dirs:
    - team/videos/
    - team/playbooks/
    - team/channel-decisions/
    - team/scripts/
    - team/audience-research/
  bootstrap:
    - path: team/playbooks/video-pipeline.md
      title: "Video production pipeline"
      skeleton: |
        # Video production pipeline

        _(From idea to published — every stage: ideation, script, record, edit, thumbnail, publish, post-mortem. Where videos get stuck, and what unblocks them.)_
    - path: team/playbooks/thumbnail.md
      title: "Thumbnail playbook"
      skeleton: |
        # Thumbnail playbook

        _(What has moved CTR on this channel, what has flopped. Face or no face, color palette, text length, emotion bias. Add a dated entry after every analytics review.)_
    - path: team/scripts/hook-library.md
      title: "Hook library"
      skeleton: |
        # Hook library

        _(First-5-second openers that earn the watch. Group by format (tutorial, commentary, case study). Note the retention numbers whenever you can.)_
    - path: team/channel-decisions/growth-log.md
      title: "Channel growth decision log"
      skeleton: |
        # Channel growth decision log

        _(Big-lever decisions: format pivots, niche shifts, upload cadence changes, thumbnail system overhauls. What we tried, what the analytics showed, what we kept.)_
    - path: team/audience-research/personas.md
      title: "Audience personas"
      skeleton: |
        # Audience personas

        _(Who actually watches — not the demographic report, the psychographic one. What problems bring them to the channel, what keeps them subscribed, what makes them leave.)_
    - path: team/videos/backlog.md
      title: "Video backlog"
      skeleton: |
        # Video backlog

        _(Unprocessed ideas. Periodically the team promotes the best ones into scripts/ or archives the rest. Do not let this page calcify.)_
