id: multi-agent-workflow-consulting
name: Multi-Agent Workflow Consulting
kind: consulting
description: Template for a consulting operation that designs and implements multi-agent workflows for clients.
objective: Help clients design, deploy, and maintain agent workflows with explicit approvals and durable evidence.
employee_blueprints:
  - workflow-automation-builder

starter:
  lead_slug: operator
  general_channel_description: "Command deck for the {{brand_name}} consulting operation."
  kickoff_prompt: "Stand up the {{brand_name}} consulting operation end to end. Use the starter lanes, turn the objective into a repeatable delivery system, create the first client-ready artifacts, and keep external side effects behind human approval."
  agents:
    - slug: operator
      emoji: "⚙️"
      name: Operator
      role: Owns priorities, approvals, and escalation decisions
      permission_mode: plan
      checked: true
      type: lead
      built_in: true
    - slug: planner
      emoji: "🧭"
      name: Planner
      role: Turns client goals into workstreams, milestones, and task plans
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Discovery
        - Scoping
        - Delivery planning
      personality: Clarifies scope quickly and turns ambiguity into an operating plan.
    - slug: workflow-architect
      emoji: "🧱"
      name: Workflow Architect
      role: Designs the workflow topology and handoffs
      employee_blueprint: workflow-automation-builder
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Handoff design
        - Agent orchestration
        - Approval mapping
      personality: Thinks in systems, dependencies, and durable boundaries.
    - slug: builder
      emoji: "🛠️"
      name: Builder
      role: Implements the first deliverables and integration assets
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Workflow assembly
        - Integration setup
        - Deliverable packaging
      personality: Biases toward shipping real artifacts, not commentary.
    - slug: reviewer
      emoji: "🔎"
      name: Reviewer
      role: Owns QA, evidence, and approval gates
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Evidence review
        - Approval hygiene
        - Client handoff QA
      personality: Keeps the system durable and visible.
  channels:
    - slug: "{{command_slug}}"
      name: "{{command_slug}}"
      description: "Executive control room for the {{brand_name}} consulting operation."
      members: [planner, workflow-architect, reviewer]
    - slug: discovery
      name: discovery
      description: "Collect client context, constraints, and workflow opportunities."
      members: [planner, workflow-architect]
    - slug: delivery
      name: delivery
      description: "Build the first execution packets and client artifacts."
      members: [builder, workflow-architect]
    - slug: systems
      name: systems
      description: "Wire integrations, approvals, and repeatable workflow loops."
      members: [builder, operator]
    - slug: review
      name: review
      description: "Track outcomes, evidence, and the next improvement loop."
      members: [reviewer, planner]
  tasks:
    - channel: discovery
      owner: planner
      title: "Turn the directive into a client operating plan"
      details: "Clarify the client objective, the workflow scope, and the first delivery milestones."
    - channel: delivery
      owner: workflow-architect
      title: "Map the first workflow handoff"
      details: "Produce the first durable artifact bundle for the consulting engagement."
    - channel: systems
      owner: builder
      title: "Define the approval and automation loop"
      details: "Map what can run automatically, what requires approval, and where workflow evidence should persist."
    - channel: review
      owner: reviewer
      title: "Set the client scorecard and review cadence"
      details: "Define success metrics, review rhythm, and feedback loops for the first iteration."

bootstrap_config:
  channel_name: "{{brand_name}}"
  channel_slug: "{{brand_slug}}"
  niche: "Consulting for teams that want multi-agent workflows they can actually run."
  audience: "Founders, operators, and internal automation teams"
  positioning: "Implementation consulting for agentic workflows with durable handoffs."
  content_pillars:
    - "Workflow architecture"
    - "Agent handoffs"
    - "Integration delivery"
  content_series:
    - "Discovery calls"
    - "Implementation sprints"
    - "Operator handoff"
  monetization_hooks:
    - "diagnostic"
    - "implementation"
    - "retainer"
    - "training"
  publishing_cadence: "Weekly client review"
  lead_magnet:
    name: "Workflow Audit Brief"
    cta: "Open the workflow audit"
    path: "/workflow-audit"
  monetization_assets:
    - stage: "Day 0"
      name: "Workflow Audit Brief"
      slot: "command_room"
      cta: "Open the workflow audit"
    - stage: "Delivery"
      name: "Implementation Sprint Outline"
      slot: "delivery_lane"
      cta: "Open the sprint outline"
    - stage: "Review"
      name: "Client Handoff Checklist"
      slot: "review_lane"
      cta: "Open the handoff checklist"
  kpi_tracking:
    - name: "Discovery calls booked"
      target: "10+ monthly"
      why: "Proves the consulting lane can capture demand."
    - name: "Workflow delivery cycle time"
      target: "< 2 weeks"
      why: "Shows the operation can move from scoping to implementation quickly."
    - name: "First paid engagement conversion"
      target: "Within 30 days"
      why: "Confirms the delivery engine reaches buyers, not only observers."
    - name: "Repeatable handoffs"
      target: "2 validated client handoffs"
      why: "Marks the point where the business becomes a reusable service."

automation:
  - id: control-plane
    kicker: Build now
    title: Control plane + workspace defaults
    copy: Load the consulting pack, queue seed, workflow drafts, and approval boundaries from template data instead of rebuilding them in the browser.
    status: build_now
    footer: "Single source of truth: template + runtime state."
  - id: discovery-engine
    kicker: Build now
    title: Client discovery + scoping packets
    copy: Turn client goals into reusable discovery packets with explicit proof assets, delivery scope, and approval gates.
    status: build_now
    footer: Discovery now seeds the first queue automatically.
  - id: workflow-engine
    kicker: Build now
    title: Workflow templates + handoff briefs
    copy: Generate workflow briefs, implementation packets, and client handoff notes from the selected engagement.
    status: build_now
    footer: Template-derived goals and approvals shape the generator prompt.
  - id: approval-plane
    kicker: Build now
    title: Approval boundaries stay explicit
    copy: Every engagement carries its own human approval list so linking accounts, publishing, spend, and legal commitments are blocked until approved.
    status: build_now
    footer: Approval policy is data-driven from the template.
  - id: review-loop
    kicker: Build now
    title: Metrics and review loop
    copy: Track delivery throughput, quality, and approval latency so the consulting operation improves each iteration.
    status: build_now
    footer: A weekly review loop is seeded by default.

monetization_ladder:
  - kicker: "Step 1"
    title: "diagnostic"
    copy: "Turn the diagnostic into a reusable commercial lane in the operating system."
    footer: "Loaded from the consulting ladder."
  - kicker: "Step 2"
    title: "implementation sprint"
    copy: "Turn the implementation sprint into a reusable commercial lane in the operating system."
    footer: "Loaded from the consulting ladder."
  - kicker: "Step 3"
    title: "retainer"
    copy: "Turn the retainer into a reusable commercial lane in the operating system."
    footer: "Loaded from the consulting ladder."
  - kicker: "Step 4"
    title: "training package"
    copy: "Turn the training package into a reusable commercial lane in the operating system."
    footer: "Loaded from the consulting ladder."

queue_seed:
  - id: discovery-plan
    title: "Turn the directive into a client operating plan"
    format: "Operational work item"
    stage_index: 0
    score: 95
    unit_cost: 8
    eta: "Iteration 1"
    monetization: "diagnostic"
    state: "active"
  - id: workflow-map
    title: "Map the first workflow handoff"
    format: "Operational work item"
    stage_index: 1
    score: 90
    unit_cost: 10
    eta: "Iteration 2"
    monetization: "implementation sprint"
    state: "active"
  - id: approval-loop
    title: "Define the approval and automation loop"
    format: "Operational work item"
    stage_index: 2
    score: 86
    unit_cost: 12
    eta: "Iteration 3"
    monetization: "retainer"
    state: "active"
  - id: scorecard-review
    title: "Set the client scorecard and review cadence"
    format: "Operational work item"
    stage_index: 3
    score: 82
    unit_cost: 12
    eta: "Iteration 4"
    monetization: "training package"
    state: "active"

stages:
  - id: discover
    name: Discover
    engine: planning
    description: "Clarify the client objective, inputs, and delivery surface."
    exit_criteria: "The engagement objective and first work items are durable."
  - id: scope
    name: Scope
    engine: planning
    description: "Turn the directive into an operating plan and artifact map."
    exit_criteria: "Starter tasks, channels, and artifact definitions exist."
  - id: implement
    name: Implement
    engine: execution
    description: "Produce the first deliverables and workflow assets."
    exit_criteria: "The first execution bundle is reviewable."
  - id: validate
    name: Validate
    engine: review
    description: "Review outputs, smoke-test workflows, and capture evidence."
    exit_criteria: "Evidence is persisted and approvals are explicit."
  - id: operate
    name: Operate
    engine: operations
    description: "Run the loop repeatedly with scorecards and approvals."
    exit_criteria: "The consulting operation has a repeatable rhythm."

artifacts:
  - id: objective_brief
    name: Objective brief
    description: "Problem statement, scope, constraints, and success criteria."
  - id: workflow_map
    name: Workflow map
    description: "Roles, handoffs, integrations, and approval gates."
  - id: execution_packet
    name: Execution packet
    description: "The current run's deliverables, checklist, and handoff context."
  - id: client_handoff
    name: Client handoff
    description: "Durable evidence for one dry-run, mock, or live delivery."

capabilities:
  - id: planning
    name: Planning and decomposition
    kind: planning
    description: "Turn the directive into workstreams, stages, and tasks."
  - id: delivery
    name: Execution and delivery
    kind: execution
    description: "Build the first deliverables and execution bundles."
  - id: integrations
    name: Integrations and handoffs
    kind: integration
    integrations: [gmail, slack, google-drive, calendar, notion]
    description: "Use connected systems as execution surfaces for the operation."
  - id: approvals
    name: Operations and approvals
    kind: execution
    description: "Run the workflows, enforce approvals, and keep state durable."
  - id: analytics
    name: Metrics and review
    kind: analysis
    description: "Track outcomes, bottlenecks, and loop improvements."

approval_rules:
  - id: external-accounts
    trigger: connect_account
    description: Human approval required before linking or authorizing a real external account.
  - id: public-send
    trigger: public_send_or_publish
    description: Human approval required before any public send, publish, or externally visible update.
  - id: spend
    trigger: spend_money
    description: Human approval required before vendor spend, ad spend, or budget commitments.
  - id: commercial-commitment
    trigger: contract_or_legal_change
    description: Human approval required before legal or commercial commitments.

connections:
  - name: "Gmail client intake lane"
    integration: gmail
    owner: Operations
    priority: critical
    purpose: "Use Gmail for intake, follow-up, and client communication."
    smoke_test: "Send a dry-run intake acknowledgement and persist evidence."
    blocker: "Needs approved Gmail credentials before any live client communication."
  - name: "Slack delivery lane"
    integration: slack
    owner: Operations
    priority: critical
    purpose: "Use Slack for team coordination and handoff updates."
    smoke_test: "Run a dry-run update and persist evidence."
    blocker: "Needs approved Slack credentials before any live message."
  - name: "Google Drive evidence lane"
    integration: google-drive
    owner: Knowledge
    priority: important
    purpose: "Use Drive for source assets, deliverables, and evidence."
    smoke_test: "Write a mock artifact bundle and confirm persistence."
    blocker: "Needs approved Drive credentials before any live file mutation."
  - name: "Calendar booking lane"
    integration: calendar
    owner: Operations
    priority: important
    purpose: "Use Calendar for discovery calls and client reviews."
    smoke_test: "Create a dry-run booking request and persist evidence."
    blocker: "Needs approved calendar access before any live scheduling."
  - name: "Notion brief lane"
    integration: notion
    owner: Knowledge
    priority: important
    purpose: "Use Notion for the reusable operating brief and handoff docs."
    smoke_test: "Mirror a dry-run brief into a mock page and persist evidence."
    blocker: "Needs approved Notion credentials before any live page mutation."

workflows:
  - id: client-intake-dry-run
    name: Client intake dry-run
    trigger: manual
    mode: dry_run
    integrations: [gmail, slack]
    checklist:
      - Confirm intake fields
      - Persist evidence
      - Capture approval gate
    description: Validate the client intake and handoff path without live side effects.
    definition:
      provider: one
      key: client-intake-dry-run
    smoke_test:
      name: Client intake dry-run
      mode: dry_run
      proof: Workflow evidence persisted without touching external systems.
      inputs:
        operation_name: Multi-Agent Workflow Consulting
  - id: workflow-audit
    name: Workflow audit
    trigger: manual
    mode: dry_run
    integrations: [google-drive, notion]
    checklist:
      - Confirm source inputs
      - Produce workflow map
      - Persist audit evidence
    description: Validate the workflow-audit path and produce the first client-ready map.
    definition:
      provider: one
      key: workflow-audit
    smoke_test:
      name: Workflow audit
      mode: dry_run
      proof: Workflow map evidence persisted successfully.
      inputs:
        operation_name: Multi-Agent Workflow Consulting
  - id: implementation-sprint
    name: Implementation sprint
    trigger: manual
    mode: mock
    integrations: [gmail, slack, google-drive, calendar]
    checklist:
      - Confirm delivery scope
      - Run the mock handoff
      - Persist sprint evidence
    description: Validate the implementation-sprint path for a client engagement.
    definition:
      provider: one
      key: implementation-sprint
    smoke_test:
      name: Implementation sprint
      mode: mock
      proof: Sprint evidence persisted successfully.
      inputs:
        operation_name: Multi-Agent Workflow Consulting
  - id: client-handoff
    name: Client handoff
    trigger: manual
    mode: mock
    integrations: [slack, notion]
    checklist:
      - Confirm handoff checklist
      - Confirm review gate
      - Persist handoff evidence
    description: Validate the final client handoff and evidence trail.
    definition:
      provider: one
      key: client-handoff
    smoke_test:
      name: Client handoff
      mode: mock
      proof: Handoff evidence persisted successfully.
      inputs:
        operation_name: Multi-Agent Workflow Consulting

wiki_schema:
  dirs:
    - team/clients/
    - team/playbooks/
    - team/case-studies/
    - team/decisions/
    - team/methodology/
  bootstrap:
    - path: team/playbooks/discovery.md
      title: "Discovery playbook"
      skeleton: |
        # Discovery playbook

        _(How we run the first two weeks with a new consulting client. Capture the questions that keep surfacing, the artifacts we produce, and the signal-to-noise from each source.)_

        ## Questions we always ask
        ## Questions we wish we had asked sooner
        ## Artifacts produced during discovery
    - path: team/playbooks/architecture-patterns.md
      title: "Workflow architecture patterns"
      skeleton: |
        # Workflow architecture patterns

        _(The re-usable multi-agent shapes we have seen work. One named pattern per section — when to reach for it, when to avoid it, what to watch for in production.)_
    - path: team/methodology/how-we-scope.md
      title: "How we scope engagements"
      skeleton: |
        # How we scope engagements

        _(Rates, deliverables, what's a fixed-scope project vs. a retainer, how we price integration risk. Keep it honest.)_
    - path: team/case-studies/template.md
      title: "Case study template"
      skeleton: |
        # Case study template

        _(Copy this page when an engagement closes. Fields: client, problem, agent shape, integrations, what worked, what did not, revised estimate vs actual, reusable assets left behind.)_
    - path: team/decisions/design-principles.md
      title: "Our workflow design principles"
      skeleton: |
        # Our workflow design principles

        _(The non-negotiables we carry from client to client. Add a dated entry the first time a project forces us to re-examine one.)_
