id: paid-discord-community
name: Paid Discord Community
kind: community
description: Template for a paid community operation that focuses on onboarding, moderation, engagement, and retention.
objective: Run a paid community with durable onboarding, moderation, engagement, and sponsor loops.
employee_blueprints:
  - discord-server-community-manager

starter:
  lead_slug: operator
  general_channel_description: "Command deck for the {{brand_name}} community operation."
  kickoff_prompt: "Stand up the {{brand_name}} community operation end to end. Use the starter lanes, turn the objective into a repeatable community system, create the first member-ready artifacts, and keep community-facing changes behind human approval."
  agents:
    - slug: operator
      emoji: "⚙️"
      name: Operator
      role: Owns priorities, approvals, and escalation decisions
      permission_mode: plan
      checked: true
      type: lead
      built_in: true
    - slug: planner
      emoji: "🧭"
      name: Planner
      role: Turns community goals into workstreams and milestones
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Discovery
        - Scoping
        - Community planning
      personality: Clarifies scope quickly and turns ambiguity into an operating plan.
    - slug: community-manager
      emoji: "🫂"
      name: Community Manager
      role: Owns onboarding, moderation, and engagement assets
      employee_blueprint: discord-server-community-manager
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Onboarding
        - Moderation
        - Engagement loops
      personality: Treats retention and clarity as the product.
    - slug: growth
      emoji: "📣"
      name: Growth
      role: Owns sponsors, member growth, and promotion
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Sponsorship
        - Growth loops
        - Promotion
      personality: Treats community growth as an operating system.
    - slug: reviewer
      emoji: "🔎"
      name: Reviewer
      role: Owns QA, evidence, and approval gates
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Evidence review
        - Moderation QA
        - Handoff QA
      personality: Keeps the system durable and visible.
  channels:
    - slug: "{{command_slug}}"
      name: "{{command_slug}}"
      description: "Executive control room for the {{brand_name}} community operation."
      members: [planner, community-manager, reviewer]
    - slug: onboarding
      name: onboarding
      description: "Collect member context, constraints, and entry flow opportunities."
      members: [planner, community-manager]
    - slug: moderation
      name: moderation
      description: "Manage rules, escalation, and moderation workflows."
      members: [community-manager, reviewer]
    - slug: engagement
      name: engagement
      description: "Shape rituals, events, and member retention loops."
      members: [growth, community-manager]
    - slug: review
      name: review
      description: "Track outcomes, evidence, and the next iteration loop."
      members: [reviewer, planner]
  tasks:
    - channel: onboarding
      owner: planner
      title: "Map the community workflow"
      details: "Clarify the member journey, rule set, and engagement scope."
    - channel: moderation
      owner: community-manager
      title: "Create the moderation and onboarding system"
      details: "Produce the first durable community artifact bundle."
    - channel: engagement
      owner: growth
      title: "Design the member engagement and sponsor loop"
      details: "Map the first growth lane to members and sponsors."
    - channel: review
      owner: reviewer
      title: "Set the community scorecard and review cadence"
      details: "Define success metrics, review rhythm, and feedback loops for the first iteration."

bootstrap_config:
  channel_name: "{{brand_name}}"
  channel_slug: "{{brand_slug}}"
  niche: "Paid communities that need better onboarding, moderation, and retention."
  audience: "Community owners, operators, and moderators"
  positioning: "A paid Discord community that can be deployed, launched, and improved with durable workflows."
  content_pillars:
    - "Onboarding"
    - "Moderation"
    - "Retention"
  content_series:
    - "Member rituals"
    - "Moderation playbooks"
    - "Weekly engagement reviews"
  monetization_hooks:
    - "membership"
    - "sponsor"
    - "workshop"
    - "digital_product"
  publishing_cadence: "Weekly community review"
  lead_magnet:
    name: "Community Operating Brief"
    cta: "Open the community brief"
    path: "/community-brief"
  monetization_assets:
    - stage: "Day 0"
      name: "Community Operating Brief"
      slot: "command_room"
      cta: "Open the community brief"
    - stage: "Onboarding"
      name: "Member Onboarding Flow"
      slot: "onboarding_lane"
      cta: "Open the onboarding flow"
    - stage: "Review"
      name: "Retention Scorecard"
      slot: "review_lane"
      cta: "Open the retention scorecard"
  kpi_tracking:
    - name: "New member activation"
      target: "50%+ monthly"
      why: "Proves the community can capture demand."
    - name: "Retention cycle time"
      target: "< 30 days"
      why: "Shows the operation can improve member stay rates."
    - name: "First paid engagement conversion"
      target: "Within 30 days"
      why: "Confirms the community reaches buyers, not only observers."
    - name: "Repeatable wins"
      target: "2 validated loops"
      why: "Marks the point where the community becomes reusable."

automation:
  - id: control-plane
    kicker: Build now
    title: Control plane + workspace defaults
    copy: Load the community pack, queue seed, workflow drafts, and approval boundaries from template data instead of rebuilding them in the browser.
    status: build_now
    footer: "Single source of truth: template + runtime state."
  - id: onboarding-engine
    kicker: Build now
    title: Onboarding + moderation packets
    copy: Turn community goals into reusable onboarding packets with explicit proof assets, delivery scope, and approval gates.
    status: build_now
    footer: Community onboarding now seeds the first queue automatically.
  - id: engagement-engine
    kicker: Build now
    title: Engagement templates + member briefs
    copy: Generate engagement briefs, moderation packets, and sponsor notes from the selected community run.
    status: build_now
    footer: Template-derived goals and approvals shape the generator prompt.
  - id: approval-plane
    kicker: Build now
    title: Approval boundaries stay explicit
    copy: Every community run carries its own human approval list so linking accounts, publishing, spend, and legal commitments are blocked until approved.
    status: build_now
    footer: Approval policy is data-driven from the template.
  - id: review-loop
    kicker: Build now
    title: Metrics and review loop
    copy: Track delivery throughput, quality, and retention latency so the community operation improves each iteration.
    status: build_now
    footer: A weekly review loop is seeded by default.

monetization_ladder:
  - kicker: "Step 1"
    title: "membership"
    copy: "Turn the membership into a reusable commercial lane in the operating system."
    footer: "Loaded from the community ladder."
  - kicker: "Step 2"
    title: "sponsor"
    copy: "Turn the sponsor lane into a reusable commercial lane in the operating system."
    footer: "Loaded from the community ladder."
  - kicker: "Step 3"
    title: "workshop"
    copy: "Turn the workshop into a reusable commercial lane in the operating system."
    footer: "Loaded from the community ladder."
  - kicker: "Step 4"
    title: "digital product"
    copy: "Turn the digital product into a reusable commercial lane in the operating system."
    footer: "Loaded from the community ladder."

queue_seed:
  - id: community-map
    title: "Map the community workflow"
    format: "Operational work item"
    stage_index: 0
    score: 95
    unit_cost: 8
    eta: "Iteration 1"
    monetization: "membership"
    state: "active"
  - id: onboarding-system
    title: "Create the onboarding and moderation system"
    format: "Operational work item"
    stage_index: 1
    score: 90
    unit_cost: 10
    eta: "Iteration 2"
    monetization: "sponsor"
    state: "active"
  - id: engagement-loop
    title: "Design the member engagement and sponsor loop"
    format: "Operational work item"
    stage_index: 2
    score: 86
    unit_cost: 12
    eta: "Iteration 3"
    monetization: "workshop"
    state: "active"
  - id: scorecard-review
    title: "Set the community scorecard and review cadence"
    format: "Operational work item"
    stage_index: 3
    score: 82
    unit_cost: 12
    eta: "Iteration 4"
    monetization: "digital product"
    state: "active"

stages:
  - id: discover
    name: Discover
    engine: planning
    description: "Clarify the community, inputs, and member surface."
    exit_criteria: "The community objective and first work items are durable."
  - id: onboard
    name: Onboard
    engine: planning
    description: "Turn the directive into an operating plan and artifact map."
    exit_criteria: "Starter tasks, channels, and artifact definitions exist."
  - id: engage
    name: Engage
    engine: execution
    description: "Produce the first deliverables and workflow assets."
    exit_criteria: "The first execution bundle is reviewable."
  - id: validate
    name: Validate
    engine: review
    description: "Review outputs, smoke-test workflows, and capture evidence."
    exit_criteria: "Evidence is persisted and approvals are explicit."
  - id: operate
    name: Operate
    engine: operations
    description: "Run the loop repeatedly with scorecards and approvals."
    exit_criteria: "The community operation has a repeatable rhythm."

artifacts:
  - id: community_brief
    name: Community brief
    description: "Problem statement, community scope, constraints, and success criteria."
  - id: onboarding_flow
    name: Onboarding flow
    description: "Member journey, moderation rules, integrations, and approval gates."
  - id: execution_packet
    name: Execution packet
    description: "The current run's deliverables, checklist, and handoff context."
  - id: retention_report
    name: Retention report
    description: "Durable evidence for one dry-run, mock, or live delivery."

capabilities:
  - id: planning
    name: Planning and decomposition
    kind: planning
    description: "Turn the directive into workstreams, stages, and tasks."
  - id: delivery
    name: Execution and delivery
    kind: execution
    description: "Build the first deliverables and execution bundles."
  - id: integrations
    name: Integrations and handoffs
    kind: integration
    integrations: [discord, gmail, slack, google-drive]
    description: "Use connected systems as execution surfaces for the operation."
  - id: approvals
    name: Operations and approvals
    kind: execution
    description: "Run the workflows, enforce approvals, and keep state durable."
  - id: analytics
    name: Metrics and review
    kind: analysis
    description: "Track outcomes, bottlenecks, and loop improvements."

approval_rules:
  - id: external-accounts
    trigger: connect_account
    description: Human approval required before linking or authorizing a real external account.
  - id: public-send
    trigger: public_send_or_publish
    description: Human approval required before any member-facing send or externally visible update.
  - id: spend
    trigger: spend_money
    description: Human approval required before sponsor spend, ad spend, or budget commitments.
  - id: commercial-commitment
    trigger: contract_or_legal_change
    description: Human approval required before legal or commercial commitments.

connections:
  - name: "Discord member lane"
    integration: discord
    owner: Operations
    priority: critical
    purpose: "Use Discord for member experience, moderation, and onboarding."
    smoke_test: "Create a dry-run onboarding message and persist evidence."
    blocker: "Needs approved Discord credentials before any live community mutation."
  - name: "Gmail member lane"
    integration: gmail
    owner: Operations
    priority: critical
    purpose: "Use Gmail for onboarding, follow-up, and customer communication."
    smoke_test: "Send a dry-run onboarding acknowledgement and persist evidence."
    blocker: "Needs approved Gmail credentials before any live customer communication."
  - name: "Slack delivery lane"
    integration: slack
    owner: Operations
    priority: critical
    purpose: "Use Slack for team coordination and handoff updates."
    smoke_test: "Run a dry-run update and persist evidence."
    blocker: "Needs approved Slack credentials before any live message."
  - name: "Google Drive evidence lane"
    integration: google-drive
    owner: Knowledge
    priority: important
    purpose: "Use Drive for source assets, community docs, and evidence."
    smoke_test: "Write a mock artifact bundle and confirm persistence."
    blocker: "Needs approved Drive credentials before any live file mutation."

workflows:
  - id: onboarding-dry-run
    name: Onboarding dry-run
    trigger: manual
    mode: dry_run
    integrations: [discord, gmail]
    checklist:
      - Confirm onboarding fields
      - Persist evidence
      - Capture approval gate
    description: Validate the community onboarding and follow-up path without live side effects.
    definition:
      provider: one
      key: onboarding-dry-run
    smoke_test:
      name: Onboarding dry-run
      mode: dry_run
      proof: Workflow evidence persisted without touching external systems.
      inputs:
        operation_name: Paid Discord Community
  - id: moderation-workflow
    name: Moderation workflow
    trigger: manual
    mode: dry_run
    integrations: [discord]
    checklist:
      - Confirm moderation rules
      - Produce the playbook
      - Persist audit evidence
    description: Validate the moderation workflow and produce the first community-ready map.
    definition:
      provider: one
      key: moderation-workflow
    smoke_test:
      name: Moderation workflow
      mode: dry_run
      proof: Moderation evidence persisted successfully.
      inputs:
        operation_name: Paid Discord Community
  - id: engagement-loop
    name: Engagement loop
    trigger: manual
    mode: mock
    integrations: [discord, slack]
    checklist:
      - Confirm engagement scope
      - Run the mock loop
      - Persist engagement evidence
    description: Validate the engagement loop for the community run.
    definition:
      provider: one
      key: engagement-loop
    smoke_test:
      name: Engagement loop
      mode: mock
      proof: Engagement evidence persisted successfully.
      inputs:
        operation_name: Paid Discord Community
  - id: retention-handoff
    name: Retention handoff
    trigger: manual
    mode: mock
    integrations: [slack, google-drive]
    checklist:
      - Confirm handoff checklist
      - Confirm review gate
      - Persist retention evidence
    description: Validate the final retention handoff and evidence trail.
    definition:
      provider: one
      key: retention-handoff
    smoke_test:
      name: Retention handoff
      mode: mock
      proof: Retention evidence persisted successfully.
      inputs:
        operation_name: Paid Discord Community

wiki_schema:
  dirs:
    - team/members/
    - team/content/
    - team/moderation/
    - team/playbooks/
    - team/events/
  bootstrap:
    - path: team/playbooks/welcome-flow.md
      title: "New member welcome flow"
      skeleton: |
        # New member welcome flow

        _(What happens in the first 72 hours after someone pays. DM sequence, channel tour, first prompt to contribute. Document the version that is actually running, not the version we wish we were running.)_
    - path: team/content/calendar.md
      title: "Content calendar"
      skeleton: |
        # Content calendar

        _(Weekly and monthly recurring posts, themed days, AMA slots. Who is on point for each. Keep this up to date — a stale calendar is a dead community.)_
    - path: team/moderation/rules.md
      title: "Moderation rules and tone"
      skeleton: |
        # Moderation rules and tone

        _(The actual rules we enforce — not just the pinned post. Edge cases, warning ladders, when to DM vs kick, how we treat disagreements between mods.)_
    - path: team/events/recurring.md
      title: "Recurring events"
      skeleton: |
        # Recurring events

        _(Office hours, community calls, show-and-tell. Cadence, host rotation, prep checklist, what we do when attendance is low.)_
    - path: team/members/whales.md
      title: "High-signal members"
      skeleton: |
        # High-signal members

        _(Members who consistently elevate the community — contributors, regulars, mentors. We invest in them, learn from them, and pull them into events. Keep notes respectful; this page is not public.)_
