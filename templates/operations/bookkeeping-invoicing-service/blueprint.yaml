id: bookkeeping-invoicing-service
name: Bookkeeping and Invoicing Service
kind: finance
description: Template for a bookkeeping operation that handles recurring books, invoicing, and evidence-backed review.
objective: Help clients keep books clean, invoices current, and approvals explicit with durable evidence.
employee_blueprints:
  - bookkeeper-financial-analyst

starter:
  lead_slug: operator
  general_channel_description: "Command deck for the {{brand_name}} bookkeeping operation."
  kickoff_prompt: "Stand up the {{brand_name}} bookkeeping operation end to end. Use the starter lanes, turn the objective into a repeatable finance system, create the first client-ready artifacts, and keep account-sensitive changes behind human approval."
  agents:
    - slug: operator
      emoji: "⚙️"
      name: Operator
      role: Owns priorities, approvals, and escalation decisions
      permission_mode: plan
      checked: true
      type: lead
      built_in: true
    - slug: planner
      emoji: "🧭"
      name: Planner
      role: Turns client finance goals into workstreams and milestones
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Discovery
        - Scoping
        - Finance planning
      personality: Clarifies scope quickly and turns ambiguity into an operating plan.
    - slug: bookkeeper
      emoji: "📚"
      name: Bookkeeper
      role: Owns reconciliation, categorization, and monthly close assets
      employee_blueprint: bookkeeper-financial-analyst
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Reconciliation
        - Categorization
        - Month-end close
      personality: Treats accuracy and traceability as the product.
    - slug: invoicing
      emoji: "🧾"
      name: Invoicing
      role: Owns invoice cadence, collections, and billing follow-up
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Invoicing
        - Collections
        - Billing hygiene
      personality: Keeps cash flow visible and predictable.
    - slug: reviewer
      emoji: "🔎"
      name: Reviewer
      role: Owns QA, evidence, and approval gates
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Evidence review
        - Finance QA
        - Handoff QA
      personality: Keeps the system durable and visible.
  channels:
    - slug: "{{command_slug}}"
      name: "{{command_slug}}"
      description: "Executive control room for the {{brand_name}} bookkeeping operation."
      members: [planner, bookkeeper, reviewer]
    - slug: intake
      name: intake
      description: "Collect client context, documents, and finance constraints."
      members: [planner, bookkeeper]
    - slug: books
      name: books
      description: "Handle reconciliation, categorization, and close workflows."
      members: [bookkeeper, reviewer]
    - slug: invoicing
      name: invoicing
      description: "Manage invoices, follow-up, and billing cadence."
      members: [invoicing, reviewer]
    - slug: review
      name: review
      description: "Track outcomes, evidence, and the next iteration loop."
      members: [reviewer, planner]
  tasks:
    - channel: intake
      owner: planner
      title: "Map the finance workflow"
      details: "Clarify document flow, invoice cadence, and monthly close scope."
    - channel: books
      owner: bookkeeper
      title: "Create the reconciliation and close system"
      details: "Produce the first durable finance artifact bundle."
    - channel: invoicing
      owner: invoicing
      title: "Design the invoicing and collections loop"
      details: "Map the first billing lane to clients and cash flow."
    - channel: review
      owner: reviewer
      title: "Set the finance scorecard and review cadence"
      details: "Define success metrics, review rhythm, and feedback loops for the first iteration."

bootstrap_config:
  channel_name: "{{brand_name}}"
  channel_slug: "{{brand_slug}}"
  niche: "Bookkeeping and invoicing for small businesses that need cleaner finance operations."
  audience: "Small business owners, operators, and bookkeepers"
  positioning: "A bookkeeping service that can be deployed, launched, and improved with durable workflows."
  content_pillars:
    - "Reconciliation"
    - "Invoicing"
    - "Month-end close"
  content_series:
    - "Close workflows"
    - "Invoice follow-up"
    - "Weekly finance reviews"
  monetization_hooks:
    - "cleanup"
    - "monthly close"
    - "advisory"
    - "retainer"
  publishing_cadence: "Weekly finance review"
  lead_magnet:
    name: "Finance Cleanup Brief"
    cta: "Open the finance cleanup brief"
    path: "/finance-cleanup"
  monetization_assets:
    - stage: "Day 0"
      name: "Finance Cleanup Brief"
      slot: "command_room"
      cta: "Open the finance cleanup brief"
    - stage: "Close"
      name: "Reconciliation Packet"
      slot: "books_lane"
      cta: "Open the reconciliation packet"
    - stage: "Review"
      name: "Invoice Follow-up Bundle"
      slot: "review_lane"
      cta: "Open the invoice bundle"
  kpi_tracking:
    - name: "Books closed on time"
      target: "95%+ monthly"
      why: "Proves the finance lane can capture demand."
    - name: "Invoice aging reduction"
      target: "< 30 days"
      why: "Shows the operation can improve cash flow."
    - name: "First paid engagement conversion"
      target: "Within 30 days"
      why: "Confirms the service reaches buyers, not only observers."
    - name: "Repeatable wins"
      target: "2 validated loops"
      why: "Marks the point where the service becomes reusable."

automation:
  - id: control-plane
    kicker: Build now
    title: Control plane + workspace defaults
    copy: Load the bookkeeping pack, queue seed, workflow drafts, and approval boundaries from template data instead of rebuilding them in the browser.
    status: build_now
    footer: "Single source of truth: template + runtime state."
  - id: finance-engine
    kicker: Build now
    title: Finance intake + reconciliation packets
    copy: Turn finance goals into reusable intake packets with explicit proof assets, delivery scope, and approval gates.
    status: build_now
    footer: Finance intake now seeds the first queue automatically.
  - id: invoice-engine
    kicker: Build now
    title: Invoice templates + close briefs
    copy: Generate close briefs, reconciliation packets, and invoice notes from the selected finance run.
    status: build_now
    footer: Template-derived goals and approvals shape the generator prompt.
  - id: approval-plane
    kicker: Build now
    title: Approval boundaries stay explicit
    copy: Every finance run carries its own human approval list so linking accounts, publishing, spend, and legal commitments are blocked until approved.
    status: build_now
    footer: Approval policy is data-driven from the template.
  - id: review-loop
    kicker: Build now
    title: Metrics and review loop
    copy: Track delivery throughput, quality, and response latency so the bookkeeping operation improves each iteration.
    status: build_now
    footer: A weekly review loop is seeded by default.

monetization_ladder:
  - kicker: "Step 1"
    title: "cleanup"
    copy: "Turn the cleanup into a reusable commercial lane in the operating system."
    footer: "Loaded from the finance ladder."
  - kicker: "Step 2"
    title: "monthly close"
    copy: "Turn the monthly close into a reusable commercial lane in the operating system."
    footer: "Loaded from the finance ladder."
  - kicker: "Step 3"
    title: "advisory"
    copy: "Turn the advisory lane into a reusable commercial lane in the operating system."
    footer: "Loaded from the finance ladder."
  - kicker: "Step 4"
    title: "retainer"
    copy: "Turn the retainer into a reusable commercial lane in the operating system."
    footer: "Loaded from the finance ladder."

queue_seed:
  - id: finance-map
    title: "Map the finance workflow"
    format: "Operational work item"
    stage_index: 0
    score: 95
    unit_cost: 8
    eta: "Iteration 1"
    monetization: "cleanup"
    state: "active"
  - id: reconciliation-system
    title: "Create the reconciliation and close system"
    format: "Operational work item"
    stage_index: 1
    score: 90
    unit_cost: 10
    eta: "Iteration 2"
    monetization: "monthly close"
    state: "active"
  - id: invoicing-loop
    title: "Design the invoicing and collections loop"
    format: "Operational work item"
    stage_index: 2
    score: 86
    unit_cost: 12
    eta: "Iteration 3"
    monetization: "advisory"
    state: "active"
  - id: scorecard-review
    title: "Set the finance scorecard and review cadence"
    format: "Operational work item"
    stage_index: 3
    score: 82
    unit_cost: 12
    eta: "Iteration 4"
    monetization: "retainer"
    state: "active"

stages:
  - id: discover
    name: Discover
    engine: planning
    description: "Clarify the finance workflow, inputs, and service surface."
    exit_criteria: "The finance objective and first work items are durable."
  - id: setup
    name: Setup
    engine: planning
    description: "Turn the directive into an operating plan and artifact map."
    exit_criteria: "Starter tasks, channels, and artifact definitions exist."
  - id: reconcile
    name: Reconcile
    engine: execution
    description: "Produce the first deliverables and workflow assets."
    exit_criteria: "The first execution bundle is reviewable."
  - id: validate
    name: Validate
    engine: review
    description: "Review outputs, smoke-test workflows, and capture evidence."
    exit_criteria: "Evidence is persisted and approvals are explicit."
  - id: operate
    name: Operate
    engine: operations
    description: "Run the loop repeatedly with scorecards and approvals."
    exit_criteria: "The finance operation has a repeatable rhythm."

artifacts:
  - id: finance_brief
    name: Finance brief
    description: "Problem statement, finance scope, constraints, and success criteria."
  - id: reconciliation_packet
    name: Reconciliation packet
    description: "Entities, close workflow, integrations, and approval gates."
  - id: execution_packet
    name: Execution packet
    description: "The current run's deliverables, checklist, and handoff context."
  - id: close_report
    name: Close report
    description: "Durable evidence for one dry-run, mock, or live delivery."

capabilities:
  - id: planning
    name: Planning and decomposition
    kind: planning
    description: "Turn the directive into workstreams, stages, and tasks."
  - id: delivery
    name: Execution and delivery
    kind: execution
    description: "Build the first deliverables and execution bundles."
  - id: integrations
    name: Integrations and handoffs
    kind: integration
    integrations: [gmail, google-drive, slack, calendar]
    description: "Use connected systems as execution surfaces for the operation."
  - id: approvals
    name: Operations and approvals
    kind: execution
    description: "Run the workflows, enforce approvals, and keep state durable."
  - id: analytics
    name: Metrics and review
    kind: analysis
    description: "Track outcomes, bottlenecks, and loop improvements."

approval_rules:
  - id: external-accounts
    trigger: connect_account
    description: Human approval required before linking or authorizing a real external account.
  - id: customer-send
    trigger: public_send_or_publish
    description: Human approval required before any customer-facing send or externally visible update.
  - id: spend
    trigger: spend_money
    description: Human approval required before vendor spend, ad spend, or budget commitments.
  - id: commercial-commitment
    trigger: contract_or_legal_change
    description: Human approval required before legal or commercial commitments.

connections:
  - name: "Gmail intake lane"
    integration: gmail
    owner: Operations
    priority: critical
    purpose: "Use Gmail for intake, follow-up, and customer communication."
    smoke_test: "Send a dry-run intake acknowledgement and persist evidence."
    blocker: "Needs approved Gmail credentials before any live customer communication."
  - name: "Google Drive evidence lane"
    integration: google-drive
    owner: Knowledge
    priority: critical
    purpose: "Use Drive for source assets, close packets, and evidence."
    smoke_test: "Write a mock artifact bundle and confirm persistence."
    blocker: "Needs approved Drive credentials before any live file mutation."
  - name: "Slack delivery lane"
    integration: slack
    owner: Operations
    priority: critical
    purpose: "Use Slack for team coordination and handoff updates."
    smoke_test: "Run a dry-run update and persist evidence."
    blocker: "Needs approved Slack credentials before any live message."
  - name: "Calendar review lane"
    integration: calendar
    owner: Operations
    priority: important
    purpose: "Use Calendar for reviews, deadlines, and recurring close calls."
    smoke_test: "Create a dry-run booking request and persist evidence."
    blocker: "Needs approved calendar access before any live scheduling."

workflows:
  - id: intake-dry-run
    name: Intake dry-run
    trigger: manual
    mode: dry_run
    integrations: [gmail]
    checklist:
      - Confirm intake fields
      - Persist evidence
      - Capture approval gate
    description: Validate the finance intake and follow-up path without live side effects.
    definition:
      provider: one
      key: intake-dry-run
    smoke_test:
      name: Intake dry-run
      mode: dry_run
      proof: Workflow evidence persisted without touching external systems.
      inputs:
        operation_name: Bookkeeping and Invoicing Service
  - id: reconciliation-workflow
    name: Reconciliation workflow
    trigger: manual
    mode: dry_run
    integrations: [google-drive]
    checklist:
      - Confirm source inputs
      - Produce reconciliation packet
      - Persist audit evidence
    description: Validate the reconciliation workflow and produce the first finance-ready map.
    definition:
      provider: one
      key: reconciliation-workflow
    smoke_test:
      name: Reconciliation workflow
      mode: dry_run
      proof: Reconciliation evidence persisted successfully.
      inputs:
        operation_name: Bookkeeping and Invoicing Service
  - id: invoicing-loop
    name: Invoicing loop
    trigger: manual
    mode: mock
    integrations: [gmail, slack]
    checklist:
      - Confirm invoicing scope
      - Run the mock loop
      - Persist invoicing evidence
    description: Validate the invoicing loop for the finance run.
    definition:
      provider: one
      key: invoicing-loop
    smoke_test:
      name: Invoicing loop
      mode: mock
      proof: Invoicing evidence persisted successfully.
      inputs:
        operation_name: Bookkeeping and Invoicing Service
  - id: close-handoff
    name: Close handoff
    trigger: manual
    mode: mock
    integrations: [slack, google-drive]
    checklist:
      - Confirm handoff checklist
      - Confirm review gate
      - Persist close evidence
    description: Validate the final close handoff and evidence trail.
    definition:
      provider: one
      key: close-handoff
    smoke_test:
      name: Close handoff
      mode: mock
      proof: Close evidence persisted successfully.
      inputs:
        operation_name: Bookkeeping and Invoicing Service

wiki_schema:
  dirs:
    - team/clients/
    - team/playbooks/
    - team/decisions/
    - team/pricing/
    - team/taxes/
  bootstrap:
    - path: team/clients/intake.md
      title: "Client intake checklist"
      skeleton: |
        # Client intake checklist

        _(Fill in as the team onboards each bookkeeping client. Capture: entity type, bank feeds, prior-year books, access to receipts, default invoicing cadence, who signs off on adjustments.)_

        ## Open questions before books are opened
        - [ ] Legal entity name, EIN, fiscal year
        - [ ] Accounting method (cash vs accrual)
        - [ ] Existing tools (QuickBooks, Xero, Wave, spreadsheets)
        - [ ] Bank and card feeds we need read access to
        - [ ] Who approves journal entries and tax-adjusting moves

        ## Red flags we have learned to watch for
        _(Add an entry every time a surprise shows up after onboarding is "done".)_
    - path: team/playbooks/monthly-close.md
      title: "Monthly close playbook"
      skeleton: |
        # Monthly close playbook

        _(The recurring month-end loop: reconcile, adjust, review, report. Document the real steps — including the parts that are not in the SOP yet.)_

        1. Reconcile every bank and card feed against statements.
        2. Flag uncategorized transactions for the client.
        3. Post recurring journal entries.
        4. Produce the month-end packet (P&L, balance sheet, AR aging).
        5. Review with the client and log any follow-ups.
    - path: team/playbooks/invoicing-cadence.md
      title: "Invoicing cadence"
      skeleton: |
        # Invoicing cadence

        _(How we bill clients of the bookkeeping service, and how we help clients bill their own customers. Two sub-sections — keep them separate.)_

        ## Our billing
        ## Client-side billing

        Document the dunning rules once we have them.
    - path: team/taxes/quarterly-filing.md
      title: "Quarterly tax filing checklist"
      skeleton: |
        # Quarterly tax filing checklist

        _(Estimated payments, sales tax, payroll tax. Per-jurisdiction notes go in sub-pages as they accumulate.)_
    - path: team/decisions/adjustment-authority.md
      title: "Who can approve adjustments"
      skeleton: |
        # Who can approve adjustments

        _(Decision log for authority rules: which categories of journal entries need human review, which can the agents post, what triggers a client-facing question. Add a dated entry every time the rule changes.)_
    - path: team/pricing/engagement-tiers.md
      title: "Engagement tiers and scope"
      skeleton: |
        # Engagement tiers and scope

        _(What's included at each pricing tier, where scope creep shows up, how we price add-ons. Keep this honest — the actual rates, not the marketing page.)_
