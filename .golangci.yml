version: "2"
run:
  timeout: 5m
  tests: true
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
    staticcheck:
      # Disable the QF* quickfix suggestions (pure style hints) and the
      # ST1000/ST1003/ST1021 naming/comment rules (pedantic, massive scope).
      # ST1005 (capitalized error strings) stays enabled — those are real.
      checks:
        - all
        - -QF1001
        - -QF1002
        - -QF1003
        - -QF1012
        - -ST1000
        - -ST1003
        - -ST1021
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/nex-crm/wuphf
