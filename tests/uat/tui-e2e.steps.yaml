# Termwright E2E: Full TUI experience test
# Note: Use 'raw' instead of 'type' for Bubbletea alt-screen compatibility

steps:
  # 1. Wait for TUI to boot
  - waitForText: {text: "Type a message", timeoutMs: 10000}
  - screenshot: {name: "01-boot"}

  # 2. Verify agent roster sidebar shows founding team
  - expectText: {text: "AGENTS", timeoutMs: 3000}
  - expectText: {text: "CEO", timeoutMs: 3000}
  - expectText: {text: "Backend Engineer", timeoutMs: 3000}
  - expectText: {text: "Frontend Engineer", timeoutMs: 3000}
  - expectText: {text: "AI Engineer", timeoutMs: 3000}
  - screenshot: {name: "02-roster-visible"}

  # 3. Type "/" via raw and verify autocomplete appears
  # "/" = 0x2F = base64 "Lw=="
  - raw: {bytes_base64: "Lw=="}
  - waitForIdle: {idleMs: 500, timeoutMs: 5000}
  - expectText: {text: "/ask", timeoutMs: 3000}
  - expectText: {text: "/agents", timeoutMs: 3000}
  - expectText: {text: "/init", timeoutMs: 3000}
  - screenshot: {name: "03-slash-autocomplete"}

  # 4. Clear and type /help, press Enter
  # Ctrl+U = 0x15 = base64 "FQ=="
  - raw: {bytes_base64: "FQ=="}
  - waitForIdle: {idleMs: 300, timeoutMs: 3000}
  # "/help" = base64 "L2hlbHA="
  - raw: {bytes_base64: "L2hlbHA="}
  - waitForIdle: {idleMs: 300, timeoutMs: 3000}
  # Enter = 0x0D = base64 "DQ=="
  - raw: {bytes_base64: "DQ=="}
  - waitForText: {text: "Available commands", timeoutMs: 5000}
  - expectText: {text: "/agents", timeoutMs: 3000}
  - expectText: {text: "/init", timeoutMs: 3000}
  - screenshot: {name: "04-help-output"}

  # 5. Type /agents and press Enter
  # "/agents" = base64 "L2FnZW50cw=="
  - raw: {bytes_base64: "L2FnZW50cw=="}
  - waitForIdle: {idleMs: 300, timeoutMs: 3000}
  - raw: {bytes_base64: "DQ=="}
  - waitForText: {text: "Active agents", timeoutMs: 5000}
  - expectText: {text: "CEO", timeoutMs: 3000}
  - screenshot: {name: "05-agents-list"}

  # 6. Type a plain message "hello team" and submit
  # "hello team" = base64 "aGVsbG8gdGVhbQ=="
  - raw: {bytes_base64: "aGVsbG8gdGVhbQ=="}
  - waitForIdle: {idleMs: 500, timeoutMs: 5000}
  - raw: {bytes_base64: "DQ=="}
  - waitForText: {text: "You", timeoutMs: 5000}
  - screenshot: {name: "06-message-submitted"}

  # 7. Wait and capture agent state
  - waitForIdle: {idleMs: 2000, timeoutMs: 15000}
  - screenshot: {name: "07-agent-state"}

  # 8. Type /init and verify autocomplete shows it
  # "/in" = base64 "L2lu"
  - raw: {bytes_base64: "L2lu"}
  - waitForIdle: {idleMs: 500, timeoutMs: 5000}
  - expectText: {text: "init", timeoutMs: 3000}
  - screenshot: {name: "08-init-autocomplete"}

  # 9. Clear and test /provider
  - raw: {bytes_base64: "FQ=="}
  - waitForIdle: {idleMs: 300, timeoutMs: 3000}
  # "/pr" = base64 "L3By"
  - raw: {bytes_base64: "L3By"}
  - waitForIdle: {idleMs: 500, timeoutMs: 5000}
  - expectText: {text: "provider", timeoutMs: 3000}
  - screenshot: {name: "09-provider-autocomplete"}

  # 10. Final screenshot and exit
  - raw: {bytes_base64: "FQ=="}
  - waitForIdle: {idleMs: 300, timeoutMs: 3000}
  - screenshot: {name: "10-final-state"}
  # Ctrl+C twice = 0x03 0x03
  - raw: {bytes_base64: "Aw=="}
  - waitForIdle: {idleMs: 500, timeoutMs: 3000}
  - raw: {bytes_base64: "Aw=="}
